<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TSI Globe Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1220;
            --fg: #e6f1ff;
            --muted: #92a0bd;
            --accent: #7df9ff;
            --card: #111b2d;
            --border: #1d2a3a;
        }
        [data-theme="light"] {
            --bg: #f1f5f9;
            --fg: #0f172a;
            --muted: #41526c;
            --accent: #0284c7;
            --card: #ffffff;
            --border: #d5deea;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: "JetBrains Mono", monospace;
        }
        .shell {
            min-height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
        }
        .topbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--card) 92%, transparent);
        }
        .topbar-left {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: color-mix(in srgb, var(--card) 90%, transparent);
            text-decoration: none;
            flex: 0 0 auto;
        }
        .brand img {
            width: 16px;
            height: 16px;
            display: block;
        }
        .title {
            margin: 0;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .title::before {
            content: ">";
            opacity: 0.6;
            margin-right: 0.55em;
        }
        .title-link {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }
        .title-link:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .topbar-center {
            justify-self: center;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: color-mix(in srgb, var(--card) 90%, transparent);
            padding: 4px 10px;
            min-height: 30px;
        }
        .diag-pill {
            display: inline-flex;
            align-items: baseline;
            gap: 4px;
            font-size: 0.63rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
        }
        .diag-pill strong {
            color: var(--fg);
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-self: end;
        }
        .btn {
            border: 1px solid var(--border);
            border-radius: 999px;
            background: color-mix(in srgb, var(--card) 90%, transparent);
            color: var(--fg);
            font: inherit;
            font-size: 0.68rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            padding: 6px 10px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .frame {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .frame iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: transparent;
        }
        .hint {
            position: absolute;
            left: 12px;
            bottom: 12px;
            z-index: 5;
            margin: 0;
            max-width: min(92vw, 620px);
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
            background: color-mix(in srgb, var(--bg) 85%, transparent);
            color: var(--muted);
            font-size: 0.65rem;
            letter-spacing: 0.04em;
            line-height: 1.45;
            cursor: pointer;
            user-select: none;
            transition: all 160ms ease;
        }
        .hint .hint-text {
            display: inline;
        }
        .hint.is-collapsed {
            width: 18px;
            height: 18px;
            padding: 0;
            border-radius: 999px;
        }
        .hint.is-collapsed .hint-text {
            display: none;
        }
        .hint.is-collapsed::after {
            content: "";
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 999px;
            background: color-mix(in srgb, var(--accent) 58%, transparent);
        }
        @media (max-width: 980px) {
            .topbar {
                grid-template-columns: 1fr;
                row-gap: 8px;
            }
            .topbar-center,
            .controls {
                justify-self: start;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <div class="topbar-left">
            <a class="brand" href="index.html?home=00#overview" aria-label="Back to Site">
                <img src="assets/global/icon/tsi-favicon.svg" alt="TSI">
            </a>
            <h1 class="title"><a class="title-link" href="globe-lab.html">TSI Globe Lab</a></h1>
        </div>
        <div class="topbar-center" aria-live="polite">
            <span class="diag-pill">FPS <strong id="diagTopFps">--</strong></span>
            <span class="diag-pill">Render <strong id="diagTopRender">--</strong></span>
            <span class="diag-pill">Zoom <strong id="diagTopZoom">--</strong></span>
            <span class="diag-pill">Lon/Lat <strong id="diagTopCenter">--</strong></span>
        </div>
        <div class="controls">
            <button type="button" class="btn" id="themeToggleBtn">Theme: Dark</button>
            <a class="btn" href="index.html?home=00#overview">Back to Site</a>
        </div>
    </header>
    <main class="frame">
        <iframe id="globeLabFrame" src="assets/pages/overview/globe-v4.1-desktop-stable.html?mode=desktop&interactive=1&theme=dark&detail=standard&v=20260302c" title="Interactive globe lab"></iframe>
        <p class="hint" id="globeLabHint" role="button" tabindex="0" aria-expanded="true"><span class="hint-text">Drag to rotate. Scroll to zoom. Use Draw/Clear for annotation. Random Jump explores new viewpoints.</span></p>
    </main>
</div>
<script>
(() => {
    const root = document.documentElement;
    const frame = document.getElementById('globeLabFrame');
    const themeBtn = document.getElementById('themeToggleBtn');
    const hint = document.getElementById('globeLabHint');
    const diagTopFps = document.getElementById('diagTopFps');
    const diagTopRender = document.getElementById('diagTopRender');
    const diagTopZoom = document.getElementById('diagTopZoom');
    const diagTopCenter = document.getElementById('diagTopCenter');

    const readTheme = () => {
        const stored = localStorage.getItem('tsi-theme');
        if (stored === 'light' || stored === 'dark') return stored;
        return 'dark';
    };
    const writeTheme = (nextTheme) => {
        localStorage.setItem('tsi-theme', nextTheme);
    };
    const applyTheme = (theme) => {
        const next = theme === 'light' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        themeBtn.textContent = `Theme: ${next === 'light' ? 'Light' : 'Dark'}`;
        const base = new URL(frame.getAttribute('src'), window.location.href);
        base.searchParams.set('theme', next);
        frame.setAttribute('src', `${base.pathname}${base.search}${base.hash}`);
    };

    const startTheme = readTheme();
    applyTheme(startTheme);

    themeBtn.addEventListener('click', () => {
        const current = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        const next = current === 'light' ? 'dark' : 'light';
        writeTheme(next);
        applyTheme(next);
    });
    const toggleHint = () => {
        if (!hint) return;
        const collapsed = hint.classList.toggle('is-collapsed');
        hint.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    };
    if (hint) {
        hint.addEventListener('click', toggleHint);
        hint.addEventListener('keydown', (event) => {
            if (event.key !== 'Enter' && event.key !== ' ') return;
            event.preventDefault();
            toggleHint();
        });
    }
    window.addEventListener('message', (event) => {
        if (!frame || event.source !== frame.contentWindow) return;
        const payload = event.data;
        if (!payload || payload.type !== 'tsi:globe-diagnostics') return;
        if (diagTopFps) diagTopFps.textContent = `${Number(payload.fps || 0).toFixed(1)}`;
        if (diagTopRender) diagTopRender.textContent = `${Number(payload.renderMs || 0).toFixed(1)}ms`;
        if (diagTopZoom) diagTopZoom.textContent = `${Number(payload.zoom || 0).toFixed(2)}x`;
        if (diagTopCenter) diagTopCenter.textContent = `${Number(payload.lon || 0).toFixed(1)}, ${Number(payload.lat || 0).toFixed(1)}`;
    });
})();
</script>
</body>
</html>
