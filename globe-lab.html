<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TSI Globe Lab</title>
    <style>
        :root {
            --bg: #0b1220;
            --fg: #e6f1ff;
            --muted: #92a0bd;
            --accent: #7df9ff;
            --card: #111b2d;
            --border: #1d2a3a;
        }
        [data-theme="light"] {
            --bg: #f1f5f9;
            --fg: #0f172a;
            --muted: #41526c;
            --accent: #0284c7;
            --card: #ffffff;
            --border: #d5deea;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: "JetBrains Mono", monospace;
        }
        .shell {
            min-height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--card) 92%, transparent);
        }
        .title {
            margin: 0;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            border: 1px solid var(--border);
            border-radius: 999px;
            background: color-mix(in srgb, var(--card) 90%, transparent);
            color: var(--fg);
            font: inherit;
            font-size: 0.68rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            padding: 6px 10px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .frame {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .frame iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: transparent;
        }
        .hint {
            position: absolute;
            left: 12px;
            bottom: 12px;
            z-index: 5;
            margin: 0;
            max-width: min(92vw, 620px);
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
            background: color-mix(in srgb, var(--bg) 85%, transparent);
            color: var(--muted);
            font-size: 0.65rem;
            letter-spacing: 0.04em;
            line-height: 1.45;
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <h1 class="title">TSI Globe Lab</h1>
        <div class="controls">
            <button type="button" class="btn" id="themeToggleBtn">Theme: Dark</button>
            <a class="btn" href="index.html#overview">Back to Site</a>
        </div>
    </header>
    <main class="frame">
        <iframe id="globeLabFrame" src="assets/pages/overview/globe-v4.1-desktop-stable.html?mode=desktop&interactive=1&theme=dark&v=20260301b" title="Interactive globe lab"></iframe>
        <p class="hint">Drag to rotate. Scroll to zoom. Use Draw/Clear for annotation. Random Jump explores new viewpoints.</p>
    </main>
</div>
<script>
(() => {
    const root = document.documentElement;
    const frame = document.getElementById('globeLabFrame');
    const themeBtn = document.getElementById('themeToggleBtn');

    const readTheme = () => {
        const stored = localStorage.getItem('tsi-theme');
        if (stored === 'light' || stored === 'dark') return stored;
        return 'dark';
    };
    const writeTheme = (nextTheme) => {
        localStorage.setItem('tsi-theme', nextTheme);
    };
    const applyTheme = (theme) => {
        const next = theme === 'light' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        themeBtn.textContent = `Theme: ${next === 'light' ? 'Light' : 'Dark'}`;
        const base = new URL(frame.getAttribute('src'), window.location.href);
        base.searchParams.set('theme', next);
        frame.setAttribute('src', `${base.pathname}${base.search}${base.hash}`);
    };

    const startTheme = readTheme();
    applyTheme(startTheme);

    themeBtn.addEventListener('click', () => {
        const current = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        const next = current === 'light' ? 'dark' : 'light';
        writeTheme(next);
        applyTheme(next);
    });
})();
</script>
</body>
</html>
