<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Investment Inquiry | TSI</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/portal-expansion.css">
</head>
<body class="portalx-page portalx-page--investment">
    <main class="portalx-shell">
        <header class="portalx-hero portalx-hero--investment">
            <p class="portalx-kicker">TSI Opportunity Desk</p>
            <h1>Investment Inquiry</h1>
            <p>This channel is intended for strategic capital partners exploring long-horizon corridor alignment.</p>
            <a class="portalx-back" href="portal-hub.html">Return to opportunity desk</a>
        </header>

        <section class="portalx-formwrap">
            <form id="portalIntakeForm" class="portalx-form" data-portal-route="investment">
                <div class="portalx-row"><label for="fullName">Full name</label><input id="fullName" name="name" required autocomplete="name"></div>
                <div class="portalx-row"><label for="email">Email</label><input id="email" type="email" name="email" required autocomplete="email"></div>
                <div class="portalx-row"><label for="firm">Firm / family office</label><input id="firm" name="org" required></div>
                <div class="portalx-row"><label for="title">Title</label><input id="title" name="role"></div>
                <div class="portalx-row"><label for="stage">Capital profile</label><input id="stage" name="investment_stage" placeholder="institutional, family office, strategic, etc." required></div>
                <div class="portalx-row"><label for="range">Typical check range</label><input id="range" name="investment_check_range" required></div>
                <div class="portalx-row"><label for="geo">Primary geography</label><input id="geo" name="investment_geography"></div>
                <div class="portalx-row"><label for="focus">Strategic thesis</label><textarea id="focus" name="investment_focus" required></textarea></div>
                <div class="portalx-row"><label for="timeline">Decision timeline</label><input id="timeline" name="investment_timeline"></div>
                <div class="portalx-row"><label for="city">City / region</label><input id="city" name="loc_city" required></div>
                <div class="portalx-row"><label for="country">Country</label><input id="country" name="loc_country" value="United States" required></div>
                <div class="portalx-row"><label for="message">Context note</label><textarea id="message" name="message" required></textarea></div>
                <div class="portalx-row"><label for="portalFile">Supporting memo (optional)</label><input id="portalFile" type="file" name="application_file" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.png,.jpg,.jpeg"><span class="portalx-help">Optional. Max 8MB.</span><span id="portalFileError" class="portalx-error" role="alert"></span></div>

                <input type="text" name="website" class="portalx-honeypot" tabindex="-1" aria-hidden="true" autocomplete="off">
                <input type="hidden" name="handler_tier" value="1">
                <input type="hidden" name="submission_type" value="investment">
                <input type="hidden" name="concierge_track" value="investment_portal">
                <input type="hidden" name="page_path" value="/portal-investment.html">
                <div class="portalx-actions"><button type="submit" class="portalx-btn">Submit confidential inquiry</button><span id="portalFormStatus" class="portalx-status" aria-live="polite"></span></div>
            </form>
        </section>
    </main>
    <script src="js/portal-intake-v2.js"></script>
</body>
</html>
