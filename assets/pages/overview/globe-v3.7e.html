<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Globe v3.7e</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1220;
    }
    body { min-height: 100svh; }
    #globe {
      width: 100vw;
      height: 100svh;
      display: block;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <svg id="globe" aria-hidden="true"></svg>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <script>
    // Single control block: edit all behavior + visual variables here.
    const CFG = {
      // Camera / motion
      // Base anchor for the globe center.
      centerLon: -99.5,
      centerLat: 31,
      // Legacy roll-only motion after intro; keep 0 when using persistent lon spin.
      postIntroRollDegPerSec: 0,
      // Section enable switches
      // False disables timeline steps, fetches, and rendering for that section.
      enableSphere: true,
      enableTexas: true,
      enableGraticule: true,
      enableLand: false,
      enableCountries: true,
      // Render mode per element: "border" | "fill" | "both" | "none"
      // "none" hides that element while keeping other logic intact.
      sphereRenderMode: "border",
      texasRenderMode: "border",
      graticuleRenderMode: "border",
      landRenderMode: "border",
      countriesRenderMode: "border",
      // Country Load behavior: "single" for one-at-once, "groups" to split into groups and fade in sequentially
      // groups mode supports "random" or region-priority sequencing.
      countriesRevealMode: "groups",
      // Group strategy: "random" | "region" | "longitude"
      countriesGroupStrategy: "longitude",
      // Region order used when countriesGroupStrategy = "region"
      countriesRegionOrderCsv: "americas,asia,africa,europe,oceania,other",
      // Longitude bands used when countriesGroupStrategy = "longitude" (start:end,... in degrees).
      // Example below loads Oceania with West Asia in the final phase chunk.
      countriesLongitudeBandsCsv: "-180:-20,-20:20,20:180",
      // Order used when countriesGroupStrategy = "longitude" (band indices).
      countriesLongitudeOrderCsv: "0,1,2",
      // Visibility-gated longitude phases:
      // phase 0 starts immediately, later phases wait until partially visible.
      countriesLongitudeVisibilityGate: true,
      // Gate mode: "band-start-midpoint" | "band-midpoint"
      countriesLongitudeVisibilityGateMode: "band-start-midpoint",
      // A phase can start when its gate longitude is within this many degrees of view center.
      countriesLongitudeVisibilityThresholdDeg: 4,
      // Optional extra hold after visibility condition is met.
      countriesLongitudePhaseGapMs: 0,
      // Extra delay per phase index (ms) in grouped modes (set 0 when using visibility gate).
      countriesGroupPhaseDelayMs: 0,
      countriesGroupCount: 12,
      countriesGroupStaggerMs: 260,
      // Base styling
      // Fill/stroke styles used by each render mode.
      sphereFill: "none",
      sphereStroke: "rgba(255,255,255,0.25)",
      sphereStrokeWidth: 1,
      graticuleStroke: "rgba(255,255,255,0.10)",
      graticuleStrokeWidth: 0.8,
      landFill: "rgba(255,255,255,0.03)",
      landStroke: "rgba(255,255,255,0.35)",
      landStrokeWidth: 1,
      countriesFill: "none",
      countriesStroke: "rgba(255,255,255,0.52)",
      countriesStrokeWidth: 1.35,
      texasFill: "none",
      texasStroke: "#ffffff",
      texasStrokeWidth: 1.2,
      // Intro zoom
      // Marker names are reusable in later "at" fields.
      introZoomId: "intro-zoom",
      introZoomStartAtMs: 0,
      introZoomDurationMs: 4200,
      introZoomFrom: 24.0,
      introZoomTo: 1.45,
      introZoomEase: "easeInOutCubic",
      introCompleteMarker: "introComplete",
      // Texas
      // Quick reveal stage (usually near start of intro zoom).
      texasRevealId: "texas-reveal",
      texasRevealStartAtMs: 840,
      texasRevealDurationMs: 1,
      texasRevealFrom: 0,
      texasRevealTo: 1,
      texasRevealEase: "linear",
      // Lon/Lat graticule lines
      // graticuleRevealAt can be a marker string such as "introComplete".
      graticuleRevealId: "graticule-reveal",
      graticuleRevealAt: "introComplete",
      graticuleRevealDurationMs: 400,
      graticuleRevealFrom: 0,
      graticuleRevealTo: 1,
      graticuleRevealEase: "easeInOutCubic",
      // Land
      // Fetch and fade are intentionally separate to retime independently.
      landFetchId: "fetch-land",
      landFetchAt: "introComplete",
      landReadyMarker: "landReady",
      landFadeId: "land-fade-in",
      landFadeAt: "landReady",
      landFadeDurationMs: 1250,
      landFadeFrom: 0,
      landFadeTo: 1,
      landFadeEase: "easeInOutCubic",
      landFadeCompleteMarker: "landFadeComplete",
      // Countries
      // If land is disabled, countriesFetchAt auto-falls back to introComplete.
      countriesFetchId: "fetch-countries",
      countriesFetchAt: "landFadeComplete",
      countriesReadyMarker: "countriesReady",
      countriesFadeId: "countries-fade-in",
      countriesFadeAt: "countriesReady",
      countriesFadeDurationMs: 450,
      countriesFadeFrom: 0,
      countriesFadeTo: 1,
      countriesFadeEase: "easeInOutCubic",
      // Stage camera controls (all off by default)
      // Offsets are additive: final view = base center/zoom + stage offsets.
      // Use one stage at a time while tuning; multiple enabled stages stack.
      // Units: lon/lat/roll in degrees, zoom offset in scale units.
      // Persist behavior:
      // - *CamPersist: true  => keep the stage end offset
      // - *CamPersist: false => return offset to 0 over *CamResetDurationMs
      // Timing source:
      // - each stage runs over that stage's reveal/fade duration.
      introCamEnabled: false,
      introCamLonFrom: 0,
      introCamLonTo: 0,
      introCamLatFrom: 0,
      introCamLatTo: 0,
      introCamRollFrom: 0,
      introCamRollTo: 0,
      introCamZoomFrom: 0,
      introCamZoomTo: 0,
      introCamEase: "easeInOutCubic",
      introCamPersist: true,
      introCamResetDurationMs: 600,
      texasCamEnabled: false,
      texasCamLonFrom: 0,
      texasCamLonTo: 0,
      texasCamLatFrom: 0,
      texasCamLatTo: 0,
      texasCamRollFrom: 0,
      texasCamRollTo: 0,
      texasCamZoomFrom: 0,
      texasCamZoomTo: 0,
      texasCamEase: "easeInOutCubic",
      texasCamPersist: true,
      texasCamResetDurationMs: 600,
      graticuleCamEnabled: false,
      graticuleCamLonFrom: 0,
      graticuleCamLonTo: 0,
      graticuleCamLatFrom: 0,
      graticuleCamLatTo: 0,
      graticuleCamRollFrom: 0,
      graticuleCamRollTo: 0,
      graticuleCamZoomFrom: 0,
      graticuleCamZoomTo: 0,
      graticuleCamEase: "easeInOutCubic",
      graticuleCamPersist: true,
      graticuleCamResetDurationMs: 600,
      landCamEnabled: false,
      landCamLonFrom: 0,
      landCamLonTo: 0,
      landCamLatFrom: 0,
      landCamLatTo: 0,
      landCamRollFrom: 0,
      landCamRollTo: 0,
      landCamZoomFrom: 0,
      landCamZoomTo: 0,
      landCamEase: "easeInOutCubic",
      landCamPersist: true,
      landCamResetDurationMs: 600,
      countriesCamEnabled: false,
      countriesCamLonFrom: 0,
      countriesCamLonTo: 0,
      countriesCamLatFrom: 0,
      countriesCamLatTo: 0,
      countriesCamRollFrom: 0,
      countriesCamRollTo: 0,
      countriesCamZoomFrom: 0,
      countriesCamZoomTo: 0,
      countriesCamEase: "easeInOutCubic",
      countriesCamPersist: true,
      countriesCamResetDurationMs: 600,
      // Persistent motion (infinite until overridden)
      // Starts at persistentMotionStartMarker and runs every frame.
      // For globe spin: use persistentLonDegPerSec and keep roll at 0.
      persistentMotionEnabled: true,
      persistentMotionStartMarker: "introComplete",
      persistentLonDegPerSec: -25,
      persistentLatDegPerSec: 0,
      persistentRollDegPerSec: 0,
      persistentZoomPerSec: 0
    };

    const clamp01 = (v) => Math.max(0, Math.min(1, v));
    const lerp = (a, b, t) => a + ((b - a) * t);
    const easeInOutCubic = (t) => (t < 0.5)
      ? (4 * t * t * t)
      : (1 - Math.pow(-2 * t + 2, 3) / 2);
    const normalizeRenderMode = (mode) => {
      const m = String(mode || "").toLowerCase();
      if (m === "border" || m === "fill" || m === "both" || m === "none") return m;
      return "border";
    };
    const normalizeCountriesGroupStrategy = (strategy) => {
      const s = String(strategy || "").toLowerCase();
      if (s === "region" || s === "longitude") return s;
      return "random";
    };
    const parseRegionOrder = (csv) => String(csv || "")
      .split(",")
      .map((token) => token.trim().toLowerCase())
      .filter(Boolean);
    const parseIndexOrder = (csv) => String(csv || "")
      .split(",")
      .map((token) => Number.parseInt(token.trim(), 10))
      .filter((n) => Number.isFinite(n) && n >= 0);
    const normalizeLon180 = (lon) => {
      let x = lon;
      while (x < -180) x += 360;
      while (x > 180) x -= 360;
      return x;
    };
    const shortestLonDistanceDeg = (a, b) => {
      const da = normalizeLon180(a);
      const db = normalizeLon180(b);
      const diff = Math.abs(da - db);
      return Math.min(diff, 360 - diff);
    };
    const midpointLonDeg = (start, end) => {
      const s = normalizeLon180(start);
      const e = normalizeLon180(end);
      const span = ((e - s + 360) % 360);
      return normalizeLon180(s + (span / 2));
    };
    const parseLongitudeBands = (csv) => String(csv || "")
      .split(",")
      .map((token) => token.trim())
      .filter(Boolean)
      .map((token) => {
        const parts = token.split(":").map((x) => Number.parseFloat(x.trim()));
        if (parts.length !== 2 || !Number.isFinite(parts[0]) || !Number.isFinite(parts[1])) return null;
        return { start: normalizeLon180(parts[0]), end: normalizeLon180(parts[1]) };
      })
      .filter(Boolean);
    const lonInBand = (lon, start, end) => {
      const x = normalizeLon180(lon);
      if (start <= end) return x >= start && x < end;
      return x >= start || x < end;
    };
    const classifyCountryRegion = (feature) => {
      const [lon, lat] = d3.geoCentroid(feature);
      if (!Number.isFinite(lon) || !Number.isFinite(lat)) return "other";
      if (lat < -60) return "other";
      if (lon >= -170 && lon <= -20) return "americas";
      if (lon >= -25 && lon <= 60 && lat >= -40 && lat <= 38) return "africa";
      if (lon >= -25 && lon <= 60 && lat > 38) return "europe";
      if (lon >= 110 && lon <= 180 && lat < 15) return "oceania";
      if (lon > 60 || lon < -170) return "asia";
      return "other";
    };
    const splitIntoSequentialGroups = (items, groupCount) => {
      const total = items.length;
      const count = Math.max(1, Math.min(total || 1, Math.floor(groupCount || 1)));
      const groups = [];
      let cursor = 0;
      for (let i = 0; i < count; i += 1) {
        const remainingItems = total - cursor;
        const remainingGroups = count - i;
        const size = Math.max(1, Math.ceil(remainingItems / remainingGroups));
        groups.push(items.slice(cursor, cursor + size));
        cursor += size;
      }
      return groups;
    };
    const classifyCountryLongitudeBand = (feature, bands) => {
      if (!bands || bands.length === 0) return -1;
      const [lon] = d3.geoCentroid(feature);
      if (!Number.isFinite(lon)) return -1;
      for (let i = 0; i < bands.length; i += 1) {
        if (lonInBand(lon, bands[i].start, bands[i].end)) return i;
      }
      return -1;
    };

    const svg = d3.select("#globe");

    let width = Math.max(1, window.innerWidth || document.documentElement.clientWidth || 1);
    let height = Math.max(1, window.innerHeight || document.documentElement.clientHeight || 1);
    let r = Math.min(width, height) / 2;
    const baseScale = () => Math.max(1, r - 10);

    const projection = d3.geoOrthographic()
      .translate([width / 2, height / 2])
      .scale(baseScale());

    const path = d3.geoPath(projection);
    const graticule = d3.geoGraticule10();

    const sphere = svg.append("path")
      .attr("fill", CFG.sphereFill)
      .attr("stroke", CFG.sphereStroke)
      .attr("stroke-width", CFG.sphereStrokeWidth);

    const graticulePath = svg.append("path")
      .attr("fill", "none")
      .attr("stroke", CFG.graticuleStroke)
      .attr("stroke-width", CFG.graticuleStrokeWidth)
      .style("display", "none")
      .style("opacity", 0);

    const landPath = svg.append("path")
      .attr("fill", CFG.landFill)
      .attr("stroke", CFG.landStroke)
      .attr("stroke-width", CFG.landStrokeWidth)
      .style("display", "none")
      .style("opacity", 0);

    const countriesPath = svg.append("path")
      .attr("fill", CFG.countriesFill)
      .attr("stroke", CFG.countriesStroke)
      .attr("stroke-width", CFG.countriesStrokeWidth)
      .style("display", "none")
      .style("opacity", 0);
    const countriesGroupLayer = svg.append("g").style("display", "none");

    const texasPath = svg.append("path")
      .attr("fill", CFG.texasFill)
      .attr("stroke", CFG.texasStroke)
      .attr("stroke-width", CFG.texasStrokeWidth)
      .style("opacity", 0);

    const applyRenderMode = (pathSel, mode, fillColor, strokeColor, strokeWidth) => {
      const m = normalizeRenderMode(mode);
      if (m === "none") {
        pathSel.attr("fill", "none").attr("stroke", "none").attr("stroke-width", 0);
        return;
      }
      if (m === "fill") {
        pathSel.attr("fill", fillColor).attr("stroke", "none").attr("stroke-width", 0);
        return;
      }
      if (m === "both") {
        pathSel.attr("fill", fillColor).attr("stroke", strokeColor).attr("stroke-width", strokeWidth);
        return;
      }
      pathSel.attr("fill", "none").attr("stroke", strokeColor).attr("stroke-width", strokeWidth);
    };

    applyRenderMode(sphere, CFG.sphereRenderMode, CFG.sphereFill, CFG.sphereStroke, CFG.sphereStrokeWidth);
    applyRenderMode(graticulePath, CFG.graticuleRenderMode, "none", CFG.graticuleStroke, CFG.graticuleStrokeWidth);
    applyRenderMode(landPath, CFG.landRenderMode, CFG.landFill, CFG.landStroke, CFG.landStrokeWidth);
    applyRenderMode(countriesPath, CFG.countriesRenderMode, CFG.countriesFill, CFG.countriesStroke, CFG.countriesStrokeWidth);
    applyRenderMode(texasPath, CFG.texasRenderMode, CFG.texasFill, CFG.texasStroke, CFG.texasStrokeWidth);

    const getAtlasUrls = (sourceKey) => {
      if (sourceKey === "cdn") {
        return {
          land: "https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json",
          countries: "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json",
          states: "https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json"
        };
      }
      return {
        land: "./data/land-110m.json",
        countries: "./data/countries-110m.json",
        states: "./data/us-states-10m.json"
      };
    };

    const params = new URLSearchParams(window.location.search || "");
    const dataSource = params.get("source") === "cdn" ? "cdn" : "local";

    const loadJsonWithFallback = async (pathKey) => {
      const primary = getAtlasUrls(dataSource);
      try {
        return await d3.json(primary[pathKey]);
      } catch (_) {
        const fallback = getAtlasUrls(dataSource === "cdn" ? "local" : "cdn");
        return d3.json(fallback[pathKey]);
      }
    };

    const setViewport = () => {
      width = Math.max(1, window.innerWidth || document.documentElement.clientWidth || 1);
      height = Math.max(1, window.innerHeight || document.documentElement.clientHeight || 1);
      r = Math.min(width, height) / 2;
      svg.attr("width", width).attr("height", height).attr("viewBox", `0 0 ${width} ${height}`);
      projection.translate([width / 2, height / 2]).scale(baseScale());
    };

    let texas = { type: "Feature", geometry: null };
    let land = null;
    let countries = null;
    let countriesGroups = [];
    let countriesGroupPaths = [];
    let countriesGroupPhaseIndices = [];
    let countriesPhaseAnchorLonByPhase = new Map();
    let countriesPhaseStartMs = new Map();

    const texLon = CFG.centerLon;
    const texLat = CFG.centerLat;
    let currentRollDeg = 0;
    let lastTs = performance.now();
    let persistentLonOffset = 0;
    let persistentLatOffset = 0;
    let persistentRollOffset = 0;
    let persistentZoomOffset = 0;

    const EASING = {
      linear: (t) => t,
      easeInOutCubic
    };

    const timelineState = {
      startTs: null,
      markers: {},
      started: new Set(),
      completed: new Set(),
      values: {
        zoom: CFG.introZoomFrom,
        texasOpacity: 0,
        graticuleOpacity: 0,
        landOpacity: 0,
        countriesOpacity: 0,
        countriesGroupOpacities: [],
        camLonOffset: 0,
        camLatOffset: 0,
        camRollOffset: 0,
        camZoomOffset: 0
      }
    };
    const countriesRevealMode = String(CFG.countriesRevealMode || "single").toLowerCase() === "groups"
      ? "groups"
      : "single";
    const countriesGroupStrategy = normalizeCountriesGroupStrategy(CFG.countriesGroupStrategy);

    const countriesFetchAtResolved = (!CFG.enableLand && CFG.countriesFetchAt === CFG.landFadeCompleteMarker)
      ? CFG.introCompleteMarker
      : CFG.countriesFetchAt;
    const countriesFadeAtResolved = (!CFG.enableLand && CFG.countriesFadeAt === CFG.countriesReadyMarker)
      ? CFG.countriesReadyMarker
      : CFG.countriesFadeAt;
    const TIMELINE = [];
    TIMELINE.push({
      id: CFG.introZoomId,
      type: "tween",
      target: "zoom",
      at: CFG.introZoomStartAtMs,
      duration: CFG.introZoomDurationMs,
      from: CFG.introZoomFrom,
      to: CFG.introZoomTo,
      ease: CFG.introZoomEase,
      completeMarker: CFG.introCompleteMarker
    });
    if (CFG.enableTexas) {
      TIMELINE.push({
        id: CFG.texasRevealId,
        type: "tween",
        target: "texasOpacity",
        at: CFG.texasRevealStartAtMs,
        duration: CFG.texasRevealDurationMs,
        from: CFG.texasRevealFrom,
        to: CFG.texasRevealTo,
        ease: CFG.texasRevealEase
      });
    }
    if (CFG.enableGraticule) {
      TIMELINE.push({
        id: CFG.graticuleRevealId,
        type: "tween",
        target: "graticuleOpacity",
        at: CFG.graticuleRevealAt,
        duration: CFG.graticuleRevealDurationMs,
        from: CFG.graticuleRevealFrom,
        to: CFG.graticuleRevealTo,
        ease: CFG.graticuleRevealEase
      });
    }
    if (CFG.enableLand) {
      TIMELINE.push({
        id: CFG.landFetchId,
        type: "fetch",
        at: CFG.landFetchAt,
        resource: "land",
        completeMarker: CFG.landReadyMarker
      });
      TIMELINE.push({
        id: CFG.landFadeId,
        type: "tween",
        target: "landOpacity",
        at: CFG.landFadeAt,
        duration: CFG.landFadeDurationMs,
        from: CFG.landFadeFrom,
        to: CFG.landFadeTo,
        ease: CFG.landFadeEase,
        completeMarker: CFG.landFadeCompleteMarker
      });
    }
    if (CFG.enableCountries) {
      TIMELINE.push({
        id: CFG.countriesFetchId,
        type: "fetch",
        at: countriesFetchAtResolved,
        resource: "countries",
        completeMarker: CFG.countriesReadyMarker
      });
      if (countriesRevealMode === "single") {
        TIMELINE.push({
          id: CFG.countriesFadeId,
          type: "tween",
          target: "countriesOpacity",
          at: countriesFadeAtResolved,
          duration: CFG.countriesFadeDurationMs,
          from: CFG.countriesFadeFrom,
          to: CFG.countriesFadeTo,
          ease: CFG.countriesFadeEase
        });
      }
    }
    const pushStageCamTweens = (prefix, atRef, durationMs, easeName) => {
      const enabledKey = `${prefix}CamEnabled`;
      if (!CFG[enabledKey]) return;
      const completeMarker = `${prefix}CamComplete`;
      TIMELINE.push({
        id: `${prefix}-cam-lon`,
        type: "tween",
        target: "camLonOffset",
        at: atRef,
        duration: durationMs,
        from: CFG[`${prefix}CamLonFrom`],
        to: CFG[`${prefix}CamLonTo`],
        ease: easeName,
        completeMarker
      });
      TIMELINE.push({
        id: `${prefix}-cam-lat`,
        type: "tween",
        target: "camLatOffset",
        at: atRef,
        duration: durationMs,
        from: CFG[`${prefix}CamLatFrom`],
        to: CFG[`${prefix}CamLatTo`],
        ease: easeName
      });
      TIMELINE.push({
        id: `${prefix}-cam-roll`,
        type: "tween",
        target: "camRollOffset",
        at: atRef,
        duration: durationMs,
        from: CFG[`${prefix}CamRollFrom`],
        to: CFG[`${prefix}CamRollTo`],
        ease: easeName
      });
      TIMELINE.push({
        id: `${prefix}-cam-zoom`,
        type: "tween",
        target: "camZoomOffset",
        at: atRef,
        duration: durationMs,
        from: CFG[`${prefix}CamZoomFrom`],
        to: CFG[`${prefix}CamZoomTo`],
        ease: easeName
      });
      if (CFG[`${prefix}CamPersist`] === false) {
        const resetDuration = Math.max(0, CFG[`${prefix}CamResetDurationMs`] || 0);
        TIMELINE.push({
          id: `${prefix}-cam-lon-reset`,
          type: "tween",
          target: "camLonOffset",
          at: completeMarker,
          duration: resetDuration,
          from: CFG[`${prefix}CamLonTo`],
          to: 0,
          ease: easeName
        });
        TIMELINE.push({
          id: `${prefix}-cam-lat-reset`,
          type: "tween",
          target: "camLatOffset",
          at: completeMarker,
          duration: resetDuration,
          from: CFG[`${prefix}CamLatTo`],
          to: 0,
          ease: easeName
        });
        TIMELINE.push({
          id: `${prefix}-cam-roll-reset`,
          type: "tween",
          target: "camRollOffset",
          at: completeMarker,
          duration: resetDuration,
          from: CFG[`${prefix}CamRollTo`],
          to: 0,
          ease: easeName
        });
        TIMELINE.push({
          id: `${prefix}-cam-zoom-reset`,
          type: "tween",
          target: "camZoomOffset",
          at: completeMarker,
          duration: resetDuration,
          from: CFG[`${prefix}CamZoomTo`],
          to: 0,
          ease: easeName
        });
      }
    };
    pushStageCamTweens("intro", CFG.introZoomStartAtMs, CFG.introZoomDurationMs, CFG.introCamEase);
    if (CFG.enableTexas) {
      pushStageCamTweens("texas", CFG.texasRevealStartAtMs, CFG.texasRevealDurationMs, CFG.texasCamEase);
    }
    if (CFG.enableGraticule) {
      pushStageCamTweens("graticule", CFG.graticuleRevealAt, CFG.graticuleRevealDurationMs, CFG.graticuleCamEase);
    }
    if (CFG.enableLand) {
      pushStageCamTweens("land", CFG.landFadeAt, CFG.landFadeDurationMs, CFG.landCamEase);
    }
    if (CFG.enableCountries) {
      const countriesStageDuration = (countriesRevealMode === "groups")
        ? (
          CFG.countriesFadeDurationMs +
          (Math.max(0, CFG.countriesGroupStaggerMs || 0) * Math.max(0, (Math.floor(CFG.countriesGroupCount || 1) - 1))) +
          (Math.max(0, CFG.countriesGroupPhaseDelayMs || 0) * 6)
        )
        : CFG.countriesFadeDurationMs;
      pushStageCamTweens("countries", countriesFadeAtResolved, countriesStageDuration, CFG.countriesCamEase);
    }

    const setMarker = (name, atMs) => {
      if (!name) return;
      if (timelineState.markers[name] == null) {
        timelineState.markers[name] = atMs;
      }
    };

    const resolveStepTime = (at) => {
      if (typeof at === "number") return at;
      if (typeof at === "string") {
        return timelineState.markers[at] == null ? null : timelineState.markers[at];
      }
      return null;
    };

    const runFetchStep = async (step) => {
      if (timelineState.started.has(step.id)) return;
      timelineState.started.add(step.id);
      try {
        if (step.resource === "land") {
          const atlas = await loadJsonWithFallback("land");
          land = topojson.feature(atlas, atlas.objects.land);
        } else if (step.resource === "countries") {
          const atlas = await loadJsonWithFallback("countries");
          countries = topojson.feature(atlas, atlas.objects.countries);
          if (countriesRevealMode === "groups" && countries && Array.isArray(countries.features)) {
            const features = countries.features.slice();
            let groups = [];
            countriesGroupPhaseIndices = [];
            countriesPhaseAnchorLonByPhase = new Map();
            countriesPhaseStartMs = new Map();
            if (countriesGroupStrategy === "region") {
              const regionOrderRaw = parseRegionOrder(CFG.countriesRegionOrderCsv);
              const fallbackOrder = ["americas", "asia", "africa", "europe", "oceania", "other"];
              const regionOrder = (regionOrderRaw.length > 0 ? regionOrderRaw : fallbackOrder);
              const regionIndexMap = new Map(regionOrder.map((name, idx) => [name, idx]));
              const buckets = new Map(regionOrder.map((name) => [name, []]));
              const otherBucket = [];
              for (const feature of features) {
                const region = classifyCountryRegion(feature);
                if (buckets.has(region)) buckets.get(region).push(feature);
                else otherBucket.push(feature);
              }
              if (otherBucket.length > 0) {
                if (!buckets.has("other")) {
                  buckets.set("other", []);
                  regionOrder.push("other");
                  regionIndexMap.set("other", regionOrder.length - 1);
                }
                buckets.get("other").push(...otherBucket);
              }
              const orderedFeatures = [];
              const orderedFeatureRegions = [];
              for (const regionName of regionOrder) {
                const bucket = (buckets.get(regionName) || []).slice();
                for (let i = bucket.length - 1; i > 0; i -= 1) {
                  const j = Math.floor(Math.random() * (i + 1));
                  const tmp = bucket[i];
                  bucket[i] = bucket[j];
                  bucket[j] = tmp;
                }
                for (const feature of bucket) {
                  orderedFeatures.push(feature);
                  orderedFeatureRegions.push(regionName);
                }
              }
              groups = splitIntoSequentialGroups(orderedFeatures, CFG.countriesGroupCount);
              let cursor = 0;
              countriesGroupPhaseIndices = groups.map((groupFeatures) => {
                const counts = new Map();
                for (let i = 0; i < groupFeatures.length; i += 1) {
                  const regionName = orderedFeatureRegions[cursor + i] || "other";
                  counts.set(regionName, (counts.get(regionName) || 0) + 1);
                }
                cursor += groupFeatures.length;
                let bestRegion = "other";
                let bestCount = -1;
                counts.forEach((count, regionName) => {
                  if (count > bestCount) {
                    bestCount = count;
                    bestRegion = regionName;
                  }
                });
                return regionIndexMap.has(bestRegion) ? regionIndexMap.get(bestRegion) : 0;
              });
            } else if (countriesGroupStrategy === "longitude") {
              const bands = parseLongitudeBands(CFG.countriesLongitudeBandsCsv);
              const bandOrderRaw = parseIndexOrder(CFG.countriesLongitudeOrderCsv);
              const fallbackOrder = bands.map((_, idx) => idx);
              const orderedBandIndices = (bandOrderRaw.length > 0 ? bandOrderRaw : fallbackOrder)
                .filter((idx, pos, arr) => idx < bands.length && arr.indexOf(idx) === pos);
              const missing = fallbackOrder.filter((idx) => !orderedBandIndices.includes(idx));
              const bandOrder = orderedBandIndices.concat(missing);
              const gateMode = String(CFG.countriesLongitudeVisibilityGateMode || "band-start-midpoint").toLowerCase();
              for (let orderPos = 0; orderPos < bandOrder.length; orderPos += 1) {
                const bandIdx = bandOrder[orderPos];
                if (bands[bandIdx]) {
                  const gateLon = (gateMode === "band-midpoint")
                    ? midpointLonDeg(bands[bandIdx].start, bands[bandIdx].end)
                    : normalizeLon180(bands[bandIdx].start);
                  countriesPhaseAnchorLonByPhase.set(orderPos, gateLon);
                }
              }
              const bandIndexMap = new Map(bandOrder.map((idx, orderPos) => [idx, orderPos]));
              const buckets = new Map(bandOrder.map((idx) => [idx, []]));
              const otherBucket = [];
              for (const feature of features) {
                const bandIdx = classifyCountryLongitudeBand(feature, bands);
                if (buckets.has(bandIdx)) buckets.get(bandIdx).push(feature);
                else otherBucket.push(feature);
              }
              const orderedFeatures = [];
              const orderedFeaturePhases = [];
              for (const bandIdx of bandOrder) {
                const bucket = (buckets.get(bandIdx) || []).slice();
                for (let i = bucket.length - 1; i > 0; i -= 1) {
                  const j = Math.floor(Math.random() * (i + 1));
                  const tmp = bucket[i];
                  bucket[i] = bucket[j];
                  bucket[j] = tmp;
                }
                for (const feature of bucket) {
                  orderedFeatures.push(feature);
                  orderedFeaturePhases.push(bandIndexMap.get(bandIdx) || 0);
                }
              }
              for (let i = otherBucket.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                const tmp = otherBucket[i];
                otherBucket[i] = otherBucket[j];
                otherBucket[j] = tmp;
              }
              const otherPhase = bandOrder.length;
              for (const feature of otherBucket) {
                orderedFeatures.push(feature);
                orderedFeaturePhases.push(otherPhase);
              }
              groups = splitIntoSequentialGroups(orderedFeatures, CFG.countriesGroupCount);
              let cursor = 0;
              countriesGroupPhaseIndices = groups.map((groupFeatures) => {
                const phaseCounts = new Map();
                for (let i = 0; i < groupFeatures.length; i += 1) {
                  const phase = orderedFeaturePhases[cursor + i] ?? otherPhase;
                  phaseCounts.set(phase, (phaseCounts.get(phase) || 0) + 1);
                }
                cursor += groupFeatures.length;
                let bestPhase = 0;
                let bestCount = -1;
                phaseCounts.forEach((count, phase) => {
                  if (count > bestCount) {
                    bestCount = count;
                    bestPhase = phase;
                  }
                });
                return bestPhase;
              });
            } else {
              for (let i = features.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                const tmp = features[i];
                features[i] = features[j];
                features[j] = tmp;
              }
              groups = splitIntoSequentialGroups(features, CFG.countriesGroupCount);
              countriesGroupPhaseIndices = groups.map((_, index) => index);
            }
            countriesGroups = groups.map((groupFeatures) => ({
              type: "FeatureCollection",
              features: groupFeatures
            }));
            countriesGroupLayer.selectAll("path").remove();
            countriesGroupPaths = countriesGroups.map(() => countriesGroupLayer.append("path").style("display", "none").style("opacity", 0));
            countriesGroupPaths.forEach((countryPath) => {
              applyRenderMode(countryPath, CFG.countriesRenderMode, CFG.countriesFill, CFG.countriesStroke, CFG.countriesStrokeWidth);
            });
            timelineState.values.countriesGroupOpacities = countriesGroups.map(() => 0);
            timelineState.values.countriesOpacity = 0;
          }
        }
      } catch (_) {
        // Keep sequence moving even if deferred atlas fetch fails.
      } finally {
        const doneMs = (timelineState.startTs == null)
          ? 0
          : (performance.now() - timelineState.startTs);
        setMarker(step.completeMarker, doneMs);
        timelineState.completed.add(step.id);
      }
    };

    const processTimeline = (elapsedMs) => {
      for (const step of TIMELINE) {
        const startMs = resolveStepTime(step.at);
        if (startMs == null) continue;

        if (step.type === "fetch") {
          if (elapsedMs >= startMs && !timelineState.started.has(step.id)) {
            runFetchStep(step);
          }
          continue;
        }

        if (step.type === "tween") {
          if (elapsedMs < startMs) continue;

          const duration = Math.max(0, step.duration || 0);
          const rawT = duration === 0 ? 1 : ((elapsedMs - startMs) / duration);
          const t = clamp01(rawT);
          const easeFn = EASING[step.ease] || EASING.linear;
          timelineState.values[step.target] = lerp(step.from, step.to, easeFn(t));

          if (t >= 1 && !timelineState.completed.has(step.id)) {
            timelineState.completed.add(step.id);
            setMarker(step.completeMarker, startMs + duration);
          }
        }
      }
    };

    const updateCountriesGroupFade = (elapsedMs) => {
      if (!CFG.enableCountries || countriesRevealMode !== "groups" || countriesGroups.length === 0) return;
      const startMs = timelineState.markers[CFG.countriesReadyMarker];
      if (startMs == null) return;
      const duration = Math.max(1, CFG.countriesFadeDurationMs || 1);
      const stagger = Math.max(0, CFG.countriesGroupStaggerMs || 0);
      const phaseDelay = Math.max(0, CFG.countriesGroupPhaseDelayMs || 0);
      const gateEnabled = Boolean(CFG.countriesLongitudeVisibilityGate) && (countriesGroupStrategy === "longitude");
      const visThreshold = Math.max(0, Math.min(180, Number(CFG.countriesLongitudeVisibilityThresholdDeg || 78)));
      const phaseGapMs = Math.max(0, Number(CFG.countriesLongitudePhaseGapMs || 0));
      const easeFn = EASING[CFG.countriesFadeEase] || EASING.linear;
      const viewLonNow = texLon + timelineState.values.camLonOffset + persistentLonOffset;
      const ensurePhaseStart = (phaseIndex) => {
        if (countriesPhaseStartMs.has(phaseIndex)) return countriesPhaseStartMs.get(phaseIndex);
        if (!gateEnabled) {
          const phaseStart = startMs + (phaseIndex * phaseDelay);
          countriesPhaseStartMs.set(phaseIndex, phaseStart);
          return phaseStart;
        }
        if (phaseIndex <= 0) {
          countriesPhaseStartMs.set(0, startMs);
          return startMs;
        }
        const priorStart = ensurePhaseStart(phaseIndex - 1);
        const minStart = priorStart + phaseGapMs;
        const anchorLon = countriesPhaseAnchorLonByPhase.get(phaseIndex);
        const isVisibleEnough = (anchorLon == null)
          ? true
          : (shortestLonDistanceDeg(viewLonNow, anchorLon) <= visThreshold);
        if (isVisibleEnough && elapsedMs >= minStart) {
          countriesPhaseStartMs.set(phaseIndex, elapsedMs);
          return elapsedMs;
        }
        return null;
      };
      for (let i = 0; i < countriesGroups.length; i += 1) {
        const phaseIndex = Math.max(0, countriesGroupPhaseIndices[i] || 0);
        const phaseStart = ensurePhaseStart(phaseIndex);
        if (phaseStart == null) continue;
        const localStart = phaseStart + (i * stagger);
        const t = clamp01((elapsedMs - localStart) / duration);
        timelineState.values.countriesGroupOpacities[i] = lerp(CFG.countriesFadeFrom, CFG.countriesFadeTo, easeFn(t));
      }
    };

    const updateView = () => {
      const viewLon = texLon + timelineState.values.camLonOffset + persistentLonOffset;
      const viewLat = texLat + timelineState.values.camLatOffset + persistentLatOffset;
      const viewRoll = currentRollDeg + timelineState.values.camRollOffset + persistentRollOffset;
      const viewZoom = Math.max(0.05, timelineState.values.zoom + timelineState.values.camZoomOffset + persistentZoomOffset);
      projection
        .rotate([-viewLon, -viewLat, viewRoll])
        .scale(baseScale() * viewZoom);
    };

    const render = () => {
      if (CFG.enableSphere && normalizeRenderMode(CFG.sphereRenderMode) !== "none") {
        sphere.style("display", "").attr("d", path({ type: "Sphere" }));
      } else {
        sphere.style("display", "none");
      }

      if (CFG.enableGraticule && normalizeRenderMode(CFG.graticuleRenderMode) !== "none" && timelineState.values.graticuleOpacity > 0) {
        graticulePath
          .style("display", "")
          .style("opacity", clamp01(timelineState.values.graticuleOpacity))
          .attr("d", path(graticule));
      } else {
        graticulePath.style("display", "none");
      }

      if (CFG.enableTexas && normalizeRenderMode(CFG.texasRenderMode) !== "none") {
        texasPath
          .attr("d", path(texas))
          .style("display", "")
          .style("opacity", clamp01(timelineState.values.texasOpacity));
      } else {
        texasPath.style("display", "none");
      }

      if (CFG.enableLand && normalizeRenderMode(CFG.landRenderMode) !== "none" && land) {
        landPath
          .attr("d", path(land))
          .style("display", "")
          .style("opacity", clamp01(timelineState.values.landOpacity));
      } else {
        landPath.style("display", "none");
      }

      if (CFG.enableCountries && normalizeRenderMode(CFG.countriesRenderMode) !== "none" && countries) {
        if (countriesRevealMode === "groups" && countriesGroupPaths.length > 0) {
          countriesPath.style("display", "none");
          countriesGroupLayer.style("display", "");
          for (let i = 0; i < countriesGroupPaths.length; i += 1) {
            countriesGroupPaths[i]
              .attr("d", path(countriesGroups[i]))
              .style("display", "")
              .style("opacity", clamp01(timelineState.values.countriesGroupOpacities[i] || 0));
          }
        } else {
          countriesGroupLayer.style("display", "none");
          countriesPath
            .attr("d", path(countries))
            .style("display", "")
            .style("opacity", clamp01(timelineState.values.countriesOpacity));
        }
      } else {
        countriesPath.style("display", "none");
        countriesGroupLayer.style("display", "none");
      }
    };

    const tick = (now) => {
      if (timelineState.startTs == null) timelineState.startTs = now;
      const elapsedMs = now - timelineState.startTs;
      const dt = Math.max(0, (now - lastTs) / 1000);
      lastTs = now;

      processTimeline(elapsedMs);
      updateCountriesGroupFade(elapsedMs);

      if (timelineState.markers[CFG.introCompleteMarker] != null) {
        currentRollDeg = (currentRollDeg + (CFG.postIntroRollDegPerSec * dt)) % 360;
      }
      if (CFG.persistentMotionEnabled) {
        const startMs = timelineState.markers[CFG.persistentMotionStartMarker];
        if (startMs != null && elapsedMs >= startMs) {
          persistentLonOffset += (CFG.persistentLonDegPerSec * dt);
          persistentLatOffset += (CFG.persistentLatDegPerSec * dt);
          persistentRollOffset += (CFG.persistentRollDegPerSec * dt);
          persistentZoomOffset += (CFG.persistentZoomPerSec * dt);
        }
      }

      updateView();
      render();
      requestAnimationFrame(tick);
    };

    const start = async () => {
      try {
        if (CFG.enableTexas) {
          const usAtlas = await loadJsonWithFallback("states");
          const states = topojson.feature(usAtlas, usAtlas.objects.states).features;
          texas = states.find((d) => d.id === "48") || texas;
        }

        setViewport();
        updateView();
        render();

        window.addEventListener("resize", () => {
          setViewport();
          updateView();
          render();
        }, { passive: true });

        requestAnimationFrame(tick);
      } catch (_) {
        // Fallback: keep simple sphere if data fails.
        setViewport();
        projection.rotate([0, 0, 0]).scale(baseScale() * CFG.introZoomTo);
        if (CFG.enableSphere && normalizeRenderMode(CFG.sphereRenderMode) !== "none") {
          sphere.attr("d", path({ type: "Sphere" }));
        }
        if (CFG.enableGraticule && normalizeRenderMode(CFG.graticuleRenderMode) !== "none") {
          graticulePath.style("display", "").attr("d", path(graticule));
        }
      }
    };

    start();
  </script>
</body>
</html>
