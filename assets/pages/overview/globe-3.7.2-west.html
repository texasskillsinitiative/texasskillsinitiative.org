<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Globe v3.7.4</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:transparent; }
    body { min-height:100svh; }
    #globe { width:100vw; height:100svh; display:block; opacity:0; transition: opacity 1.5s ease-in; }
  </style>
</head>
<body>
  <svg id="globe" aria-hidden="true"></svg>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <script>
    const OPT = {
      introDuration: 4500,
      startZoom: 22.0,           
      targetZoom: 2.5,           // Even tighter for a massive Earth feel
      texasCenter: [-99.5, 31],
      
      // Flight Settings
      driftSpeed: 0.04,          
      flightTilt: -38,           // Deep look down
      horizonYRatio: 0.7,        // Focus point at 70% of current viewport height
      dotCount: 500,             
      dotColor: "rgba(255,255,255,0.4)"
    };

    const svg = d3.select("#globe");
    let width = Math.max(1, window.innerWidth || document.documentElement.clientWidth || 1);
    let height = Math.max(1, window.innerHeight || document.documentElement.clientHeight || 1);
    let baseScale = Math.max(width, height) / 2;
    let currentScale = baseScale * OPT.startZoom;
    let currentRotate = [-OPT.texasCenter[0], -OPT.texasCenter[1], 0];

    // The translate here is what physically moves the horizon down the screen
    const projection = d3.geoOrthographic()
      .translate([width / 2, height * OPT.horizonYRatio]) 
      .clipAngle(90); 

    const path = d3.geoPath().projection(projection);
    const gLand = svg.append("g"), gDots = svg.append("g"), gTexas = svg.append("g");

    function applyViewportSize() {
      width = Math.max(1, window.innerWidth || document.documentElement.clientWidth || 1);
      height = Math.max(1, window.innerHeight || document.documentElement.clientHeight || 1);
      baseScale = Math.max(width, height) / 2;
      svg.attr("viewBox", `0 0 ${width} ${height}`);
      svg.attr("width", width).attr("height", height);
      projection
        .translate([width / 2, height * OPT.horizonYRatio])
        .scale(currentScale)
        .rotate(currentRotate);
    }

    Promise.all([
      d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json"),
      d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
    ]).then(([world, us]) => {
      
      const land = topojson.feature(world, world.objects.land);
      const landPath = gLand.append("path").datum(land)
        .attr("fill", "rgba(255,255,255,0.02)").attr("stroke", "rgba(255,255,255,0.12)");

      const states = topojson.feature(us, us.objects.states).features;
      const texasGeo = states.find(d => d.id === "48");
      const texasPath = gTexas.append("path").datum(texasGeo)
        .attr("fill", "rgba(255,255,255,0.06)").attr("stroke", "#ffffff").attr("stroke-width", 1.2);

      const dotsData = [];
      while(dotsData.length < OPT.dotCount) {
        const p = [Math.random()*360-180, Math.random()*180-90];
        if(d3.geoContains(land, p)) dotsData.push({type:"Feature", geometry:{type:"Point", coordinates:p}});
      }
      const dots = gDots.selectAll("path").data(dotsData).enter().append("path").attr("fill", OPT.dotColor);

      svg.style("opacity", 1); 

      let startTime = performance.now();
      // Start with the exact longitude needed to center Texas
      let currentLon = -OPT.texasCenter[0]; 

      function tick(now) {
        const elapsed = now - startTime;
        let progress = Math.min(elapsed / OPT.introDuration, 1);
        
        // Exponential ease-out for the "takeoff" effect
        const ease = 1 - Math.pow(1 - progress, 3);

        if (progress < 1) {
          // --- INTRO ---
          const zoom = OPT.startZoom + (OPT.targetZoom - OPT.startZoom) * ease;
          // Interpolate latitude from Texas (31) to our flight tilt
          const currentLat = -OPT.texasCenter[1] + (OPT.flightTilt - (-OPT.texasCenter[1])) * ease;
          
          currentScale = baseScale * zoom;
          currentRotate = [currentLon, currentLat, 0];
          projection.scale(currentScale);
          projection.rotate(currentRotate);
        } else {
          // --- WESTWARD FLIGHT ---
          // Incrementing longitude makes the Earth rotate under the camera
          currentLon += OPT.driftSpeed;
          currentScale = baseScale * OPT.targetZoom;
          currentRotate = [currentLon, OPT.flightTilt, 0];
          projection.scale(currentScale);
          projection.rotate(currentRotate);
        }

        landPath.attr("d", path);
        texasPath.attr("d", path);
        dots.attr("d", path);

        requestAnimationFrame(tick);
      }
      applyViewportSize();
      window.addEventListener("resize", applyViewportSize, { passive: true });
      requestAnimationFrame(tick);
    });
  </script>
</body>
</html>
