    };

    const shuffleInPlace = (arr) => {
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = arr[i];
        arr[i] = arr[j];
        arr[j] = tmp;
      }
    };
    const rebuildCountriesGroups = (features) => {
      countriesGroups = [];
      countriesGroupPhaseIndices = [];
      countriesPhaseAnchorLonByPhase = new Map();
      countriesPhaseStartMs = new Map();
      countriesImmediatePhaseIndices = new Set();
      countriesPhaseStaggerMs = new Map();
      countriesGroupStartJitters = [];
      timelineState.values.countriesGroupOpacities = [];
      timelineState.values.countriesOpacity = 0;
      if (!Array.isArray(features) || features.length === 0) return;

      const bands = (CFG.countriesLongitudeChunkWidthDeg != null && Number(CFG.countriesLongitudeChunkWidthDeg) > 0)
        ? generateLongitudeBands(CFG.countriesLongitudeChunkWidthDeg, CFG.countriesLongitudeStartEastEdgeDeg)
        : parseLongitudeBands(CFG.countriesLongitudeBandsCsv);
      const bandOrderRaw = parseIndexOrder(CFG.countriesLongitudeOrderCsv);
      const fallbackOrder = bands.map((_, idx) => idx);
      const orderedBandIndices = (bandOrderRaw.length > 0 ? bandOrderRaw : fallbackOrder)
        .filter((idx, pos, arr) => idx < bands.length && arr.indexOf(idx) === pos);
      const missing = fallbackOrder.filter((idx) => !orderedBandIndices.includes(idx));
      const bandOrder = orderedBandIndices.concat(missing);
      const gateMode = String(CFG.countriesLongitudeVisibilityGateMode || "band-start-midpoint").toLowerCase();
      const bandIndexMap = new Map(bandOrder.map((idx, orderPos) => [idx, orderPos]));
      for (let orderPos = 0; orderPos < bandOrder.length; orderPos += 1) {
        const bandIdx = bandOrder[orderPos];
        if (!bands[bandIdx]) continue;
        const gateLon = (gateMode === "band-midpoint")
          ? midpointLonDeg(bands[bandIdx].start, bands[bandIdx].end)
          : (gateMode === "band-east-edge")
            ? normalizeLon180(Math.max(bands[bandIdx].start, bands[bandIdx].end))
            : normalizeLon180(bands[bandIdx].start);
        countriesPhaseAnchorLonByPhase.set(orderPos, gateLon);
      }
      for (const bandIdx of bandOrder) {
        const band = bands[bandIdx];
        if (!band) continue;
        if (bandOverlapsRange(band.start, band.end, CFG.countriesImmediateRangeWestDeg, CFG.countriesImmediateRangeEastDeg)) {
          countriesImmediatePhaseIndices.add(bandIndexMap.get(bandIdx) || 0);
        }
      }

      const buckets = new Map(bandOrder.map((idx) => [idx, []]));
      const otherBucket = [];
      for (const feature of features) {
        const bandIdx = classifyCountryLongitudeBand(feature, bands);
        if (buckets.has(bandIdx)) buckets.get(bandIdx).push(feature);
        else otherBucket.push(feature);
      }

      const groups = [];
      const groupPhases = [];
      const perBandCount = Math.max(1, Math.floor(CFG.countriesGroupPerBandCount || 1));
      for (const bandIdx of bandOrder) {
        const bucket = (buckets.get(bandIdx) || []).slice();
        if (bucket.length === 0) continue;
        shuffleInPlace(bucket);
        const bandPhase = bandIndexMap.get(bandIdx) || 0;
        const bandGroups = splitIntoSequentialGroups(bucket, perBandCount);
        for (const groupFeatures of bandGroups) {
          if (groupFeatures.length === 0) continue;
          groups.push({
            type: "FeatureCollection",
            features: groupFeatures
          });
          groupPhases.push(bandPhase);
        }
      }
      if (otherBucket.length > 0) {
        shuffleInPlace(otherBucket);
        const otherPhase = bandOrder.length;
        const otherGroups = splitIntoSequentialGroups(otherBucket, perBandCount);
        for (const groupFeatures of otherGroups) {
          if (groupFeatures.length === 0) continue;
          groups.push({
            type: "FeatureCollection",
            features: groupFeatures
          });
          groupPhases.push(otherPhase);
        }
      }

      countriesGroups = groups;
      countriesGroupPhaseIndices = groupPhases;
      timelineState.values.countriesGroupOpacities = countriesGroups.map(() => 0);
      timelineState.values.countriesOpacity = 0;

      const duration = Math.max(1, CFG.countriesFadeDurationMs || 1);
      const chunkMode = String(CFG.countriesChunkLoadMode || "velocity").toLowerCase();
      const spinSpeed = Math.abs(getLonSpeedDegPerSec());
      const chunkDegrees = Math.max(0, Number(CFG.countriesChunkDegrees || 0));
      const chunkLoadSeconds = (chunkMode === "velocity")
        ? (spinSpeed > 0 ? (chunkDegrees / spinSpeed) : 0)
        : Math.max(0, Number(CFG.countriesChunkLoadSeconds || 0));
      const chunkLoadMs = Math.max(0, chunkLoadSeconds * 1000);
      const defaultStaggerMs = Math.max(0, CFG.countriesGroupStaggerMs || 0);
      const phaseCounts = new Map();
      for (let i = 0; i < countriesGroups.length; i += 1) {
        const phaseIndex = Math.max(0, countriesGroupPhaseIndices[i] || 0);
        phaseCounts.set(phaseIndex, (phaseCounts.get(phaseIndex) || 0) + 1);
      }
      countriesPhaseStaggerMs = new Map();
      phaseCounts.forEach((count, phaseIndex) => {
        if (chunkMode === "stagger") {
          countriesPhaseStaggerMs.set(phaseIndex, defaultStaggerMs);
          return;
        }
        if (count <= 1) {
          countriesPhaseStaggerMs.set(phaseIndex, 0);
          return;
        }
        const stagger = Math.max(0, (chunkLoadMs - duration) / (count - 1));
        countriesPhaseStaggerMs.set(phaseIndex, stagger);
      });
      const jitterMs = Math.max(0, Number(CFG.countriesGroupStartJitterMs || 0));
      countriesGroupStartJitters = countriesGroups.map(() => (jitterMs > 0 ? (Math.random() * jitterMs) : 0));
      countriesRevealComplete = false;
      countriesFlattened = false;
    };

    const runFetchStep = async (step) => {
      if (timelineState.started.has(step.id)) return;
      timelineState.started.add(step.id);
      try {
        if (step.resource === "land") {
          const atlas = await loadJsonWithFallback("land");
          land = topojson.feature(atlas, atlas.objects.land);
          projectionDirty = true;
        } else if (step.resource === "countries") {
          const atlas = await loadJsonWithFallback("countries");
          countries = topojson.feature(atlas, atlas.objects.countries);
          countryFeatureByKey = new Map();
          if (countries && Array.isArray(countries.features)) {
            countries.features.forEach((feature) => {
              const name = readCountryName(feature);
              if (!name) return;
              countryFeatureByKey.set(normalizeCountryKey(name), feature);
            });
          }
          if (countriesRevealMode === "groups" && countries && Array.isArray(countries.features)) {
            rebuildCountriesGroups(countries.features.slice());
          }
          projectionDirty = true;
        }
      } catch (err) {
        console.warn(`[globe] Failed to fetch ${step.resource} atlas; continuing timeline.`, err);
      } finally {
        const doneMs = (timelineState.startTs == null)
          ? 0
          : (performance.now() - timelineState.startTs);
        setMarker(step.completeMarker, doneMs);
        timelineState.completed.add(step.id);
      }
    };

    const processTimeline = (elapsedMs) => {
      for (const step of TIMELINE) {
        const startMs = resolveStepTime(step.at);
        if (startMs == null) continue;

        if (step.type === "fetch") {
          if (elapsedMs >= startMs && !timelineState.started.has(step.id)) {
            runFetchStep(step);
          }
          continue;
        }

        if (step.type === "tween") {
          if (elapsedMs < startMs) continue;

          const duration = Math.max(0, step.duration || 0);
          const rawT = duration === 0 ? 1 : ((elapsedMs - startMs) / duration);
          const t = clamp01(rawT);
          const easeFn = EASING[step.ease] || EASING.linear;
          timelineState.values[step.target] = lerp(step.from, step.to, easeFn(t));

          if (t >= 1 && !timelineState.completed.has(step.id)) {
            timelineState.completed.add(step.id);
            setMarker(step.completeMarker, startMs + duration);
            if (step.id === CFG.countriesFadeId) {
              countriesRevealComplete = true;
            }
          }
        }
      }
    };

    const updateCountriesGroupFade = (elapsedMs) => {
      if (!ENABLE.countries || countriesRevealMode !== "groups" || countriesGroups.length === 0) return;
      if (countriesRevealComplete) return;
      const startMs = timelineState.markers[CFG.countriesReadyMarker];
      if (startMs == null) return;
      const duration = Math.max(1, CFG.countriesFadeDurationMs || 1);
      const phaseDelay = Math.max(0, CFG.countriesGroupPhaseDelayMs || 0);
      const gateEnabled = Boolean(CFG.countriesLongitudeVisibilityGate);
      const visThreshold = Math.max(0, Math.min(180, Number(CFG.countriesLongitudeVisibilityThresholdDeg || 78)));
      const phaseGapMs = Math.max(0, Number(CFG.countriesLongitudePhaseGapMs || 0));
      const easeFn = EASING[CFG.countriesFadeEase] || EASING.linear;
      const viewLonNow = texLon + persistentLonOffset;
      const gateCenterOffset = Number(CFG.countriesLongitudeVisibilityCenterOffsetDeg || 0);
      const allImmediateStarted = () => {
        if (!countriesImmediatePhaseIndices || countriesImmediatePhaseIndices.size === 0) return true;
        for (const phaseIndex of countriesImmediatePhaseIndices) {
          if (!countriesPhaseStartMs.has(phaseIndex)) return false;
        }
        return true;
      };
      const effectiveGateOffset = allImmediateStarted() ? gateCenterOffset : 0;
      const phaseCounters = new Map();
      const ensurePhaseStart = (phaseIndex) => {
        if (countriesPhaseStartMs.has(phaseIndex)) return countriesPhaseStartMs.get(phaseIndex);
        if (!gateEnabled) {
          const phaseStart = startMs + (phaseIndex * phaseDelay);
          countriesPhaseStartMs.set(phaseIndex, phaseStart);
          return phaseStart;
        }
        if (countriesImmediatePhaseIndices.has(phaseIndex)) {
          const leadMs = Math.max(0, Number(CFG.countriesImmediatePhaseLeadMs || 0));
          const immediateStart = Math.max(0, startMs - leadMs);
          countriesPhaseStartMs.set(phaseIndex, immediateStart);
          return immediateStart;
        }
        const priorStart = ensurePhaseStart(phaseIndex - 1);
        const minStart = priorStart + phaseGapMs;
        const anchorLon = countriesPhaseAnchorLonByPhase.get(phaseIndex);
        const gateCenterLon = normalizeLon180(viewLonNow + effectiveGateOffset);
        const isVisibleEnough = (anchorLon == null)
          ? true
          : (shortestLonDistanceDeg(gateCenterLon, anchorLon) <= visThreshold);
        if (isVisibleEnough && elapsedMs >= minStart) {
          countriesPhaseStartMs.set(phaseIndex, elapsedMs);
          return elapsedMs;
        }
        return null;
      };
      for (let i = 0; i < countriesGroups.length; i += 1) {
        const phaseIndex = Math.max(0, countriesGroupPhaseIndices[i] || 0);
        const phaseStart = ensurePhaseStart(phaseIndex);
        if (phaseStart == null) continue;
        const phasePos = phaseCounters.get(phaseIndex) || 0;
        phaseCounters.set(phaseIndex, phasePos + 1);
        const stagger = countriesPhaseStaggerMs.get(phaseIndex) || 0;
        const jitter = countriesGroupStartJitters[i] || 0;
        const localStart = phaseStart + (phasePos * stagger) + jitter;
        const phaseDuration = countriesImmediatePhaseIndices.has(phaseIndex) && Number(CFG.countriesImmediateFadeDurationMs || 0) > 0
          ? Math.max(1, Number(CFG.countriesImmediateFadeDurationMs || 1))
          : duration;
        const t = clamp01((elapsedMs - localStart) / phaseDuration);
        timelineState.values.countriesGroupOpacities[i] = lerp(CFG.countriesFadeFrom, CFG.countriesFadeTo, easeFn(t));
      }
      const targetOpacity = CFG.countriesFadeTo;
      const epsilon = 1e-4;
      const allDone = timelineState.values.countriesGroupOpacities.every((v) => v >= (targetOpacity - epsilon));
      if (allDone) countriesRevealComplete = true;
    };

    let projectionDirty = true;
    let lastViewKey = "";
    let lastCountriesStaticRenderKey = "";
    const updateView = () => {
      const viewLon = texLon + persistentLonOffset + userLonOffset;
      const viewLat = Math.max(-88, Math.min(88, texLat + persistentLatOffset + userLatOffset));
      const viewRoll = currentRollDeg + persistentRollOffset;
      const viewZoom = getViewZoom();
      const viewKey = `${viewLon.toFixed(4)}|${viewLat.toFixed(4)}|${viewRoll.toFixed(4)}|${viewZoom.toFixed(4)}|${width}|${height}`;
      if (viewKey !== lastViewKey) {
        lastViewKey = viewKey;
        projectionDirty = true;
        projection
          .rotate([-viewLon, -viewLat, viewRoll])
          .scale(baseScale() * viewZoom);
      }
    };

    const renderDoodles = () => {
      doodleCtx.clearRect(0, 0, doodleCanvas.width, doodleCanvas.height);
      if (!doodleStrokes.length) return;
      doodleCtx.save();
      doodleCtx.lineCap = "round";
      doodleCtx.lineJoin = "round";
      doodleCtx.lineWidth = 2;
      doodleCtx.strokeStyle = drawStrokeColor;

      doodleStrokes.forEach((stroke) => {
        if (!stroke || !stroke.length) return;
        let drewPoint = false;
        doodleCtx.beginPath();
        for (let i = 0; i < stroke.length; i += 1) {
          const point = projection(stroke[i]);
          if (!point || !Number.isFinite(point[0]) || !Number.isFinite(point[1])) {
            drewPoint = false;
            continue;
          }
          if (!drewPoint) {
            doodleCtx.moveTo(point[0], point[1]);
            drewPoint = true;
          } else {
            doodleCtx.lineTo(point[0], point[1]);
          }
        }
        if (drewPoint) doodleCtx.stroke();
      });
      doodleCtx.restore();
    };

    const applyLayerOrder = () => {
      const toRank = (key) => {
        const idx = layerOrder.indexOf(key);
        return idx < 0 ? 999 : idx;
      };
      const baseLayers = [
        { key: "sphere", node: sphere.node() },
        { key: "graticule", node: graticulePath.node() },
        { key: "land", node: landPath.node() }
      ].sort((a, b) => toRank(a.key) - toRank(b.key));
      baseLayers.forEach((entry) => {
        if (entry.node && entry.node.parentNode) entry.node.parentNode.appendChild(entry.node);
      });

      const overlayLayers = [
        { key: "states", node: statesPath.node() },
        { key: "texas", node: texasPath.node() }
      ].sort((a, b) => toRank(a.key) - toRank(b.key));
      overlayLayers.forEach((entry) => {
        if (entry.node && entry.node.parentNode) entry.node.parentNode.appendChild(entry.node);
      });

      const minRank = (keys) => keys.reduce((acc, key) => Math.min(acc, toRank(key)), 999);
      svgBase.style("z-index", String(minRank(["sphere", "graticule", "land"])));
      countriesCanvas.style.zIndex = String(toRank("countries"));
      svgOverlay.style("z-index", String(minRank(["states", "texas"])));
      doodleCanvas.style.zIndex = "30";
    };

    const drawCountriesCanvas = () => {
      countriesCtx.clearRect(0, 0, countriesCanvas.width, countriesCanvas.height);
      if (!(ENABLE.countries && layerVisibility.countries && normalizeRenderMode(CFG.countriesRenderMode) !== "none" && countries)) {
        lastCountriesStaticRenderKey = "";
        return;
      }
      const hiddenCountryKeys = new Set(
        Array.from(countryOverrides.values())
          .filter((entry) => entry && entry.visible === false)
          .map((entry) => normalizeCountryKey(entry.name))
      );
      const mode = normalizeRenderMode(CFG.countriesRenderMode);
      const doFill = mode === "fill" || mode === "both";
      const doStroke = mode === "border" || mode === "both";
      const canvasPath = d3.geoPath(projection, countriesCtx);

      countriesCtx.save();
      countriesCtx.lineWidth = CFG.countriesStrokeWidth || 1;
      countriesCtx.strokeStyle = CFG.countriesStroke;
      countriesCtx.fillStyle = CFG.countriesFill;
      const drawCollection = (collection, alpha) => {
        if (!collection || !Array.isArray(collection.features) || collection.features.length === 0) return;
        const filtered = collection.features.filter((feature) => {
          const key = normalizeCountryKey(readCountryName(feature));
          return !hiddenCountryKeys.has(key);
        });
        if (!filtered.length) return;
        countriesCtx.globalAlpha = clamp01(alpha);
        countriesCtx.beginPath();
        canvasPath({ type: "FeatureCollection", features: filtered });
        if (doFill) countriesCtx.fill();
        if (doStroke) countriesCtx.stroke();
      };
      if (countriesRevealMode === "groups" && countriesGroups.length > 0 && !countriesFlattened) {
        for (let i = 0; i < countriesGroups.length; i += 1) {
          const alpha = clamp01(timelineState.values.countriesGroupOpacities[i] || 0);
          if (alpha <= 0) continue;
          drawCollection(countriesGroups[i], alpha);
        }
      } else {
        drawCollection(countries, clamp01(timelineState.values.countriesOpacity));
      }

      // Draw color overrides on top of default countries render.
      countryOverrides.forEach((entry) => {
        if (!entry || entry.visible === false) return;
        const key = normalizeCountryKey(entry.name);
        const feature = countryFeatureByKey.get(key);
        if (!feature) return;
        countriesCtx.globalAlpha = 1;
        countriesCtx.strokeStyle = entry.color || CFG.countriesStroke;
        countriesCtx.fillStyle = "rgba(0,0,0,0)";
        countriesCtx.lineWidth = Math.max(1.2, Number(CFG.countriesStrokeWidth || 1) + 0.4);
        countriesCtx.beginPath();
        canvasPath(feature);
        countriesCtx.stroke();
      });
      countriesCtx.restore();
    };

    const render = () => {
      const renderStart = performance.now();
      renderBackgroundCanvas(renderStart);
      const drawPaths = projectionDirty;
      applyLayerOrder();
      if (ENABLE.sphere && layerVisibility.sphere && normalizeRenderMode(CFG.sphereRenderMode) !== "none") {
        sphere.style("display", "");
        if (drawPaths) sphere.attr("d", path({ type: "Sphere" }));
      } else {
        sphere.style("display", "none");
      }

      if (ENABLE.graticule && layerVisibility.graticule && normalizeRenderMode(CFG.graticuleRenderMode) !== "none" && timelineState.values.graticuleOpacity > 0) {
        graticulePath
          .style("display", "")
          .style("opacity", clamp01(timelineState.values.graticuleOpacity));
        if (drawPaths) graticulePath.attr("d", path(graticule));
      } else {
        graticulePath.style("display", "none");
      }

      if (ENABLE.texas && layerVisibility.texas && normalizeRenderMode(CFG.texasRenderMode) !== "none") {
        texasPath
          .style("display", "")
          .style("opacity", clamp01(timelineState.values.texasOpacity));
        if (drawPaths) texasPath.attr("d", path(texas));
        if (!settledToGlobeBg && timelineState.values.texasOpacity > 0.001) {
          settledToGlobeBg = true;
          setDocumentBackground(globeBg);
        }
      } else {
        texasPath.style("display", "none");
      }

      if (ENABLE.states && layerVisibility.states && usStates) {
        statesPath
          .style("display", "")
          .style("opacity", 1);
        if (drawPaths) statesPath.attr("d", path(usStates));
      } else {
        statesPath.style("display", "none");
      }

      if (ENABLE.land && layerVisibility.land && normalizeRenderMode(CFG.landRenderMode) !== "none" && land) {
        landPath
          .style("display", "")
          .style("opacity", clamp01(timelineState.values.landOpacity));
        if (drawPaths) landPath.attr("d", path(land));
      } else {
        landPath.style("display", "none");
      }

      if (drawPaths) {
        drawCountriesCanvas();
      } else {
        const mode = normalizeRenderMode(CFG.countriesRenderMode);
        const opacitiesKey = (countriesRevealMode === "groups" && countriesGroups.length > 0 && !countriesFlattened)
          ? timelineState.values.countriesGroupOpacities.map((v) => clamp01(v || 0).toFixed(3)).join(",")
          : clamp01(timelineState.values.countriesOpacity).toFixed(3);
        const overridesKey = Array.from(countryOverrides.values())
          .map((entry) => `${normalizeCountryKey(entry.name)}:${entry.visible ? "1" : "0"}:${entry.color}`)
          .sort()
          .join("|");
        const staticRenderKey = `${mode}|${CFG.countriesStrokeWidth}|${CFG.countriesStroke}|${CFG.countriesFill}|${opacitiesKey}|${countriesRevealMode}|${countriesFlattened}|${overridesKey}`;
        if (staticRenderKey !== lastCountriesStaticRenderKey) {
          lastCountriesStaticRenderKey = staticRenderKey;
          drawCountriesCanvas();
        }
      }

      if (countriesRevealMode === "groups" && countriesRevealComplete && !countriesFlattened) {
        countriesFlattened = true;
        countriesGroups = [];
        timelineState.values.countriesOpacity = CFG.countriesFadeTo;
      }

      renderDoodles();
      diagState.renderMs = performance.now() - renderStart;
      projectionDirty = false;
    };

    const initInteractive = () => {
      if (!interactiveEnabled || !globeStage || !playControls) return;
      globeStage.classList.add("is-interactive");
      playControls.classList.add("is-visible");
      playControls.setAttribute("aria-hidden", "false");

      const playPauseBtn = document.getElementById("playPauseBtn");
      const drawToggleBtn = document.getElementById("drawToggleBtn");
      const drawColorPicker = document.getElementById("drawColorPicker");
      const clearDrawBtn = document.getElementById("clearDrawBtn");
      const zoomOutBtn = document.getElementById("zoomOutBtn");
      const zoomInBtn = document.getElementById("zoomInBtn");
      const resetViewBtn = document.getElementById("resetViewBtn");
      const randomJumpBtn = document.getElementById("randomJumpBtn");
      const spinSpeedRange = document.getElementById("spinSpeedRange");
      const spinSpeedLabel = document.getElementById("spinSpeedLabel");
      const latFocusRange = document.getElementById("latFocusRange");
      const latFocusLabel = document.getElementById("latFocusLabel");
      const layerOrderList = document.getElementById("layerOrderList");
      const countryOverrideName = document.getElementById("countryOverrideName");
      const countryOverrideColor = document.getElementById("countryOverrideColor");
      const countryOverrideAddBtn = document.getElementById("countryOverrideAddBtn");
      const countryOverrideStatus = document.getElementById("countryOverrideStatus");
      const backgroundColorPicker = document.getElementById("backgroundColorPicker");
      const starsEnabledChk = document.getElementById("starsEnabledChk");
      const starsColorPicker = document.getElementById("starsColorPicker");
      const starsTwinkleChk = document.getElementById("starsTwinkleChk");
      const detailSourceSelect = document.getElementById("detailSourceSelect");
      const applyDetailBtn = document.getElementById("applyDetailBtn");
      const saveSettingsBtn = document.getElementById("saveSettingsBtn");
      const loadSettingsBtn = document.getElementById("loadSettingsBtn");
      diagnosticsUi = null;

      let drawMode = false;
      let drawing = false;
      let dragging = false;
      let lastX = 0;
      let lastY = 0;
      let lastDragTs = 0;

      const setDrawMode = (active) => {
        drawMode = active === true;
        globeStage.classList.toggle("is-draw-mode", drawMode);
        if (drawToggleBtn) drawToggleBtn.classList.toggle("active", drawMode);
      };

      if (doodleCtx) {
        doodleCtx.lineCap = "round";
        doodleCtx.lineJoin = "round";
        doodleCtx.lineWidth = 2;
        doodleCtx.strokeStyle = drawStrokeColor;
      }

      const getLocalPoint = (event) => {
        const rect = doodleCanvas.getBoundingClientRect();
        return {
          x: Math.max(0, Math.min(rect.width, event.clientX - rect.left)),
          y: Math.max(0, Math.min(rect.height, event.clientY - rect.top))
        };
      };

      const updateSpinUi = () => {
        if (playPauseBtn) {
          playPauseBtn.textContent = spinEnabled ? "Pause Spin" : "Resume Spin";
          playPauseBtn.classList.toggle("active", !spinEnabled);
        }
        if (spinSpeedRange) spinSpeedRange.value = String(Math.round(spinSpeedDegPerSec));
        if (spinSpeedLabel) spinSpeedLabel.textContent = `${Math.round(spinSpeedDegPerSec)} deg/s`;
      };
      const updateLatFocusUi = () => {
        const latTarget = Math.max(-88, Math.min(88, texLat + userLatOffset));
        if (latFocusRange) latFocusRange.value = String(Math.round(latTarget));
        if (latFocusLabel) latFocusLabel.textContent = `${Math.round(latTarget)} deg`;
      };
      const updateLayerToggleUi = () => {};
      const getBaseLayerColorHex = (key) => {
        if (key === "sphere") return colorToHex(CFG.sphereStroke);
        if (key === "graticule") return colorToHex(CFG.graticuleStroke);
        if (key === "land") return colorToHex(CFG.landStroke);
        if (key === "countries") return colorToHex(CFG.countriesStroke);
        if (key === "states") return colorToHex(CFG.statesStroke);
        if (key === "texas") return colorToHex(CFG.texasStroke);
        return "#7df9ff";
      };
      const setBaseLayerColorHex = (key, hex) => {
        if (!hex) return;
        if (key === "sphere") {
          CFG.sphereStroke = hex;
          sphere.attr("stroke", CFG.sphereStroke);
          return;
        }
        if (key === "graticule") {
          CFG.graticuleStroke = hex;
          graticulePath.attr("stroke", CFG.graticuleStroke);
          return;
        }
        if (key === "land") {
          const currentAlpha = (parseRgb(CFG.landFill) || {}).a;
          const fillAlpha = Number.isFinite(currentAlpha) ? currentAlpha : (viewTheme === "light" ? 0.04 : 0.03);
          CFG.landStroke = hex;
          CFG.landFill = hexToRgba(hex, fillAlpha);
          landPath.attr("stroke", CFG.landStroke).attr("fill", CFG.landFill);
          return;
        }
        if (key === "countries") {
          CFG.countriesStroke = hex;
          return;
        }
        if (key === "states") {
          CFG.statesStroke = hex;
          statesPath.attr("stroke", CFG.statesStroke);
          return;
        }
        if (key === "texas") {
          const currentAlpha = (parseRgb(CFG.texasFill) || {}).a;
          const fillAlpha = Number.isFinite(currentAlpha) ? currentAlpha : (viewTheme === "light" ? 0.12 : 0.05);
          CFG.texasStroke = hex;
          CFG.texasFill = hexToRgba(hex, fillAlpha);
          texasPath.attr("stroke", CFG.texasStroke).attr("fill", CFG.texasFill);
        }
      };
      const updateLayerOrderUi = () => {
        if (!layerOrderList) return;
        layerOrderList.innerHTML = "";
        layerOrder.forEach((key) => {
          const accent = getBaseLayerColorHex(key);
          const item = document.createElement("li");
          item.className = "layer-order-item";
          item.draggable = true;
          item.dataset.layerType = "base";
          item.dataset.layerKey = key;
          item.style.setProperty("--layer-accent", accent);
          if (!layerVisibility[key]) item.classList.add("is-off");
          item.innerHTML = `
            <span class="label">${layerLabels[key] || key}</span>
            <span class="controls">
              <input type="color" class="layer-color-picker" value="${accent}" aria-label="Set ${layerLabels[key] || key} color" />
            </span>
          `;
          layerOrderList.appendChild(item);
        });
        const orderedOverrideKeys = overrideLayerOrder.filter((key) => countryOverrides.has(key));
        Array.from(countryOverrides.keys()).forEach((key) => {
          if (!orderedOverrideKeys.includes(key)) orderedOverrideKeys.push(key);
        });
        overrideLayerOrder = orderedOverrideKeys.slice();
        orderedOverrideKeys.forEach((key) => {
          const entry = countryOverrides.get(key);
          if (!entry) return;
            const accent = colorToHex(entry.color, "#ffd166");
            const item = document.createElement("li");
            item.className = "layer-order-item";
            item.draggable = true;
            item.dataset.layerType = "override";
            item.dataset.layerKey = key;
            item.style.setProperty("--layer-accent", accent);
            if (!entry.visible) item.classList.add("is-off");
            item.innerHTML = `
              <span class="label">Override: ${entry.name}</span>
              <span class="controls">
                <input type="color" class="layer-color-picker" value="${accent}" aria-label="Set ${entry.name} override color" />
                <button type="button" class="remove" aria-label="Remove override">x</button>
              </span>
            `;
          layerOrderList.appendChild(item);
        });
      };
      const updateCountryOverrideUi = () => {
        const entries = Array.from(countryOverrides.values());
        if (!countryOverrideStatus) return;
        countryOverrideStatus.textContent = entries.length
          ? `${entries.length} override(s) configured.`
          : "No overrides yet.";
      };
      const applySavedSettings = (settings) => {
        if (!settings || typeof settings !== "object") return;
        if (settings.layerVisibility && typeof settings.layerVisibility === "object") {
          Object.keys(layerVisibility).forEach((key) => {
            if (typeof settings.layerVisibility[key] === "boolean") {
              layerVisibility[key] = settings.layerVisibility[key];
            }
          });
        }
        if (Array.isArray(settings.layerOrder)) {
          const cleaned = settings.layerOrder.filter((key) => defaultLayerOrder.includes(key));
          const missing = defaultLayerOrder.filter((key) => !cleaned.includes(key));
          layerOrder = cleaned.concat(missing);
        }
        if (settings.background && typeof settings.background === "object") {
          if (settings.background.color) {
            backgroundColorHex = colorToHex(settings.background.color, "#0b1220");
            CFG.backgroundColor = backgroundColorHex;
            setDocumentBackground(backgroundColorHex);
          }
          if (typeof settings.background.starsEnabled === "boolean") starsEnabled = settings.background.starsEnabled;
          if (settings.background.starsColor) starsColorHex = colorToHex(settings.background.starsColor, "#cfe8ff");
          if (typeof settings.background.starsTwinkle === "boolean") starsTwinkle = settings.background.starsTwinkle;
        }
        if (settings.colors && typeof settings.colors === "object") {
          if (settings.colors.sphereStroke) {
            CFG.sphereStroke = settings.colors.sphereStroke;
            sphere.attr("stroke", CFG.sphereStroke);
          }
          if (settings.colors.graticuleStroke) {
            CFG.graticuleStroke = settings.colors.graticuleStroke;
            graticulePath.attr("stroke", CFG.graticuleStroke);
          }
          if (settings.colors.landStroke) {
            CFG.landStroke = settings.colors.landStroke;
            const currentAlpha = (parseRgb(CFG.landFill) || {}).a;
            CFG.landFill = hexToRgba(CFG.landStroke, Number.isFinite(currentAlpha) ? currentAlpha : 0.03);
            landPath.attr("stroke", CFG.landStroke).attr("fill", CFG.landFill);
          }
          if (settings.colors.countriesStroke) CFG.countriesStroke = settings.colors.countriesStroke;
          if (settings.colors.statesStroke) {
            CFG.statesStroke = settings.colors.statesStroke;
            statesPath.attr("stroke", CFG.statesStroke);
          }
          if (settings.colors.texasStroke) {
            CFG.texasStroke = settings.colors.texasStroke;
            const texasAlpha = (parseRgb(CFG.texasFill) || {}).a;
            CFG.texasFill = hexToRgba(CFG.texasStroke, Number.isFinite(texasAlpha) ? texasAlpha : 0.05);
            texasPath.attr("stroke", CFG.texasStroke).attr("fill", CFG.texasFill);
          }
          if (settings.colors.drawStrokeColor) drawStrokeColor = settings.colors.drawStrokeColor;
        }
        if (typeof settings.spinSpeedDegPerSec === "number") spinSpeedDegPerSec = settings.spinSpeedDegPerSec;
        if (typeof settings.spinEnabled === "boolean") spinEnabled = settings.spinEnabled;
        if (typeof settings.userLonOffset === "number") userLonOffset = settings.userLonOffset;
        if (typeof settings.userLatOffset === "number") userLatOffset = settings.userLatOffset;
        if (typeof settings.userZoomOffset === "number") userZoomOffset = settings.userZoomOffset;
        countryOverrides.clear();
        overrideLayerOrder = [];
        if (Array.isArray(settings.countryOverrides)) {
          settings.countryOverrides.forEach((entry) => {
            const name = String((entry && entry.name) || "").trim();
            if (!name) return;
            const key = normalizeCountryKey(name);
            countryOverrides.set(key, {
              name,
              color: String(entry.color || "#ffd166"),
              visible: entry.visible !== false
            });
          });
        }
        if (Array.isArray(settings.overrideLayerOrder)) {
          const cleanedOverrideOrder = settings.overrideLayerOrder
            .map((value) => normalizeCountryKey(value))
            .filter((value, idx, arr) => value && arr.indexOf(value) === idx && countryOverrides.has(value));
          const missingOverrideKeys = Array.from(countryOverrides.keys()).filter((key) => !cleanedOverrideOrder.includes(key));
          overrideLayerOrder = cleanedOverrideOrder.concat(missingOverrideKeys);
        } else {
          overrideLayerOrder = Array.from(countryOverrides.keys());
        }
        if (backgroundColorPicker) backgroundColorPicker.value = colorToHex(backgroundColorHex, "#0b1220");
        if (starsEnabledChk) starsEnabledChk.checked = starsEnabled;
        if (starsColorPicker) starsColorPicker.value = colorToHex(starsColorHex, "#cfe8ff");
        if (starsTwinkleChk) starsTwinkleChk.checked = starsTwinkle;
        rebuildStarsField();
        updateLayerOrderUi();
        updateLayerToggleUi();
        updateSpinUi();
        updateLatFocusUi();
        updateCountryOverrideUi();
        projectionDirty = true;
        lastCountriesStaticRenderKey = "";
        render();
      };
      const bindColorPicker = (picker, onInput) => {
        if (!picker || typeof onInput !== "function") return;
        picker.addEventListener("input", () => {
          onInput(String(picker.value || "").trim());
          projectionDirty = true;
          lastCountriesStaticRenderKey = "";
          render();
        });
      };

      if (playPauseBtn) {
        playPauseBtn.addEventListener("click", () => {
          spinEnabled = !spinEnabled;
          updateSpinUi();
        });
      }

      if (drawToggleBtn) {
        drawToggleBtn.addEventListener("click", () => {
          setDrawMode(!drawMode);
        });
      }

      if (clearDrawBtn) {
        clearDrawBtn.addEventListener("click", () => {
          doodleStrokes.length = 0;
          activeDoodleStroke = null;
          doodleCtx.clearRect(0, 0, doodleCanvas.width, doodleCanvas.height);
        });
      }

      if (zoomOutBtn) {
        zoomOutBtn.addEventListener("click", () => {
          userZoomOffset = Math.max(-0.85, userZoomOffset - 0.08);
        });
      }

      if (zoomInBtn) {
        zoomInBtn.addEventListener("click", () => {
          userZoomOffset = Math.min(2.2, userZoomOffset + 0.08);
        });
      }

      if (resetViewBtn) {
        resetViewBtn.addEventListener("click", () => {
          userLonOffset = 0;
          userLatOffset = 0;
          userZoomOffset = 0;
          dragVelocityLon = 0;
          dragVelocityLat = 0;
          inertiaActive = false;
          spinEnabled = true;
          spinSpeedDegPerSec = Number(CFG.persistentLonDegPerSec || -20);
          updateSpinUi();
          updateLatFocusUi();
        });
      }

      if (randomJumpBtn) {
        randomJumpBtn.addEventListener("click", () => {
          userLonOffset = (Math.random() * 300) - 150;
          userLatOffset = (Math.random() * 110) - 55;
          userZoomOffset = (Math.random() * 0.9) - 0.15;
          dragVelocityLon = 0;
          dragVelocityLat = 0;
          inertiaActive = false;
          updateLatFocusUi();
        });
      }

      if (spinSpeedRange) {
        spinSpeedRange.value = String(Math.round(spinSpeedDegPerSec));
        spinSpeedRange.addEventListener("input", () => {
          spinSpeedDegPerSec = Number(spinSpeedRange.value || 0);
          if (Math.abs(spinSpeedDegPerSec) > 0) spinEnabled = true;
          updateSpinUi();
        });
      }
      if (latFocusRange) {
        latFocusRange.value = String(Math.round(texLat));
        latFocusRange.addEventListener("input", () => {
          const nextLat = Number(latFocusRange.value || texLat);
          if (!Number.isFinite(nextLat)) return;
          userLatOffset = Math.max(-88, Math.min(88, nextLat)) - texLat;
          dragVelocityLat = 0;
          inertiaActive = false;
          updateLatFocusUi();
        });
      }
      updateSpinUi();
      updateLatFocusUi();
      updateLayerToggleUi();
      updateLayerOrderUi();
      updateCountryOverrideUi();
      refreshLatUi = updateLatFocusUi;
      if (layerOrderList) {
        let draggedKey = "";
        let draggedType = "";
        layerOrderList.addEventListener("dragstart", (event) => {
          const item = event.target && event.target.closest(".layer-order-item");
          if (!item) return;
          draggedKey = String(item.dataset.layerKey || "");
          draggedType = String(item.dataset.layerType || "");
          item.classList.add("dragging");
          if (event.dataTransfer) event.dataTransfer.effectAllowed = "move";
        });
        layerOrderList.addEventListener("dragend", (event) => {
          const item = event.target && event.target.closest(".layer-order-item");
          if (item) item.classList.remove("dragging");
          draggedKey = "";
          draggedType = "";
        });
        layerOrderList.addEventListener("dragover", (event) => {
          event.preventDefault();
          if (event.dataTransfer) event.dataTransfer.dropEffect = "move";
        });
        layerOrderList.addEventListener("drop", (event) => {
          event.preventDefault();
          const item = event.target && event.target.closest(".layer-order-item");
          if (!item) return;
          const targetType = String(item.dataset.layerType || "");
          const targetKey = item ? String(item.dataset.layerKey || "") : "";
          if (!draggedKey || !targetKey || draggedKey === targetKey) return;
          if (draggedType === "base" && targetType === "base") {
            const from = layerOrder.indexOf(draggedKey);
            const to = layerOrder.indexOf(targetKey);
            if (from < 0 || to < 0) return;
            const [moved] = layerOrder.splice(from, 1);
            layerOrder.splice(to, 0, moved);
          } else if (draggedType === "override" && targetType === "override") {
            const from = overrideLayerOrder.indexOf(draggedKey);
            const to = overrideLayerOrder.indexOf(targetKey);
            if (from < 0 || to < 0) return;
            const [moved] = overrideLayerOrder.splice(from, 1);
            overrideLayerOrder.splice(to, 0, moved);
          } else {
            return;
          }
          updateLayerOrderUi();
          projectionDirty = true;
          render();
        });
        layerOrderList.addEventListener("click", (event) => {
          const item = event.target && event.target.closest(".layer-order-item");
          if (!item) return;
          if (event.target && event.target.closest(".layer-color-picker")) return;
          const itemType = String(item.dataset.layerType || "");
          const key = String(item.dataset.layerKey || "");
          if (!key) return;
          const removeBtn = event.target && event.target.closest(".remove");
          if (removeBtn && itemType === "override") {
            countryOverrides.delete(key);
            overrideLayerOrder = overrideLayerOrder.filter((entryKey) => entryKey !== key);
            updateCountryOverrideUi();
            updateLayerOrderUi();
            projectionDirty = true;
            lastCountriesStaticRenderKey = "";
            render();
            return;
          }
          if (itemType === "base") {
            layerVisibility[key] = !layerVisibility[key];
          } else if (itemType === "override") {
            const entry = countryOverrides.get(key);
            if (!entry) return;
            entry.visible = !entry.visible;
            countryOverrides.set(key, entry);
          }
          updateCountryOverrideUi();
          updateLayerOrderUi();
          projectionDirty = true;
          lastCountriesStaticRenderKey = "";
          render();
        });
        layerOrderList.addEventListener("input", (event) => {
          const picker = event.target && event.target.closest(".layer-color-picker");
          if (!picker) return;
          const item = picker.closest(".layer-order-item");
          if (!item) return;
          const itemType = String(item.dataset.layerType || "");
          const key = String(item.dataset.layerKey || "");
          const nextHex = colorToHex(String(picker.value || "").trim(), "#7df9ff");
          if (!key) return;
          if (itemType === "base") {
            setBaseLayerColorHex(key, nextHex);
          } else if (itemType === "override") {
            const entry = countryOverrides.get(key);
            if (!entry) return;
            entry.color = nextHex;
            countryOverrides.set(key, entry);
          } else {
            return;
          }
          item.style.setProperty("--layer-accent", nextHex);
          projectionDirty = true;
          lastCountriesStaticRenderKey = "";
          render();
        });
      }

      if (drawColorPicker) drawColorPicker.value = colorToHex(drawStrokeColor);
      if (backgroundColorPicker) backgroundColorPicker.value = colorToHex(backgroundColorHex, "#0b1220");
      if (starsEnabledChk) starsEnabledChk.checked = starsEnabled;
      if (starsColorPicker) starsColorPicker.value = colorToHex(starsColorHex, "#cfe8ff");
      if (starsTwinkleChk) starsTwinkleChk.checked = starsTwinkle;
      setDocumentBackground(backgroundColorHex);
      rebuildStarsField();

      bindColorPicker(drawColorPicker, (hex) => {
        drawStrokeColor = hexToRgba(hex, 0.92);
      });
      bindColorPicker(backgroundColorPicker, (hex) => {
        backgroundColorHex = colorToHex(hex, "#0b1220");
        CFG.backgroundColor = backgroundColorHex;
        setDocumentBackground(backgroundColorHex);
      });
      bindColorPicker(starsColorPicker, (hex) => {
        starsColorHex = colorToHex(hex, "#cfe8ff");
      });
      if (starsEnabledChk) {
        starsEnabledChk.addEventListener("change", () => {
          starsEnabled = starsEnabledChk.checked === true;
          projectionDirty = true;
          render();
        });
      }
      if (starsTwinkleChk) {
        starsTwinkleChk.addEventListener("change", () => {
          starsTwinkle = starsTwinkleChk.checked === true;
          projectionDirty = true;
          render();
        });
      }
      if (countryOverrideAddBtn) {
        countryOverrideAddBtn.addEventListener("click", () => {
          const name = String(countryOverrideName && countryOverrideName.value || "").trim();
          if (!name) return;
          const key = normalizeCountryKey(name);
          countryOverrides.set(key, {
            name,
            color: String(countryOverrideColor && countryOverrideColor.value || "#ffd166"),
            visible: true
          });
          if (!overrideLayerOrder.includes(key)) overrideLayerOrder.push(key);
          updateCountryOverrideUi();
          updateLayerOrderUi();
          projectionDirty = true;
          lastCountriesStaticRenderKey = "";
          render();
        });
      }
      if (detailSourceSelect) detailSourceSelect.value = detailParam;
      if (applyDetailBtn) {
        applyDetailBtn.addEventListener("click", () => {
          const nextDetail = (detailSourceSelect && detailSourceSelect.value === "high") ? "high" : "standard";
          const nextUrl = new URL(window.location.href);
          nextUrl.searchParams.set("detail", nextDetail);
          window.location.href = `${nextUrl.pathname}${nextUrl.search}${nextUrl.hash}`;
        });
      }
      if (saveSettingsBtn) {
        saveSettingsBtn.addEventListener("click", () => {
          saveSettings();
        });
      }
      if (loadSettingsBtn) {
        loadSettingsBtn.addEventListener("click", () => {
          const saved = readSavedSettings();
          if (saved) applySavedSettings(saved);
        });
      }

      doodleCanvas.addEventListener("pointerdown", (event) => {
        if (!drawMode) return;
        drawing = true;
        const p = getLocalPoint(event);
        const geo = projection.invert([p.x, p.y]);
        activeDoodleStroke = [];
        if (geo && Number.isFinite(geo[0]) && Number.isFinite(geo[1])) {
          activeDoodleStroke.push(geo);
        }
        doodleStrokes.push(activeDoodleStroke);
        doodleCanvas.setPointerCapture(event.pointerId);
      });
      doodleCanvas.addEventListener("pointermove", (event) => {
        if (!drawMode || !drawing) return;
        const p = getLocalPoint(event);
        const geo = projection.invert([p.x, p.y]);
        if (!activeDoodleStroke || !geo || !Number.isFinite(geo[0]) || !Number.isFinite(geo[1])) return;
        activeDoodleStroke.push(geo);
      });
      const stopDraw = (event) => {
        if (event && doodleCanvas.hasPointerCapture(event.pointerId)) {
          doodleCanvas.releasePointerCapture(event.pointerId);
        }
        drawing = false;
        activeDoodleStroke = null;
      };
      doodleCanvas.addEventListener("pointerup", stopDraw);
      doodleCanvas.addEventListener("pointercancel", stopDraw);
      doodleCanvas.addEventListener("pointerleave", stopDraw);

      globeStage.addEventListener("pointerdown", (event) => {
        if (drawMode) return;
        dragging = true;
        isUserDragging = true;
        isPointerHoldOverride = true;
        inertiaActive = false;
        dragVelocityLon = 0;
        dragVelocityLat = 0;
        lastX = event.clientX;
        lastY = event.clientY;
        lastDragTs = event.timeStamp || performance.now();
        globeStage.setPointerCapture(event.pointerId);
      });
      globeStage.addEventListener("pointermove", (event) => {
        if (!dragging || drawMode) return;
        const dx = event.clientX - lastX;
        const dy = event.clientY - lastY;
        const nowTs = event.timeStamp || performance.now();
        const moveDt = Math.max(0.001, (nowTs - lastDragTs) / 1000);
        lastDragTs = nowTs;
        lastX = event.clientX;
        lastY = event.clientY;
        const zoomFactor = Math.max(0.55, getViewZoom());
        const lonDelta = (-dx * 0.22) / zoomFactor;
        const latDelta = (dy * 0.22) / zoomFactor;
        userLonOffset += lonDelta;
        userLatOffset += latDelta;
        dragVelocityLon = lonDelta / moveDt;
        dragVelocityLat = latDelta / moveDt;
        updateLatFocusUi();
      });
      const stopDrag = (event) => {
        if (event && globeStage.hasPointerCapture(event.pointerId)) {
          globeStage.releasePointerCapture(event.pointerId);
        }
        if (Math.abs(dragVelocityLon) > INERTIA_MIN_SPEED || Math.abs(dragVelocityLat) > INERTIA_MIN_SPEED) {
          inertiaActive = true;
        }
        dragging = false;
        isUserDragging = false;
        isPointerHoldOverride = false;
      };
      globeStage.addEventListener("pointerup", stopDrag);
      globeStage.addEventListener("pointercancel", stopDrag);
      globeStage.addEventListener("pointerleave", stopDrag);

      globeStage.addEventListener("wheel", (event) => {
        event.preventDefault();
        userZoomOffset = Math.max(-0.85, Math.min(2.2, userZoomOffset - (event.deltaY * 0.0015)));
      }, { passive: false });
    };

    const tick = (now) => {
      if (timelineState.startTs == null) timelineState.startTs = now;
      const elapsedMs = now - timelineState.startTs;
      const dt = Math.max(0, (now - lastTs) / 1000);
      lastTs = now;

      if (interactiveEnabled && !Number.isNaN(dt) && dt > 0) {
        if (inertiaActive) {
          userLonOffset += dragVelocityLon * dt;
          userLatOffset += dragVelocityLat * dt;
          const damping = Math.exp(-INERTIA_DAMPING * dt);
          dragVelocityLon *= damping;
          dragVelocityLat *= damping;
          if (Math.abs(dragVelocityLon) < INERTIA_MIN_SPEED && Math.abs(dragVelocityLat) < INERTIA_MIN_SPEED) {
            inertiaActive = false;
          }
        }
        if (spinEnabled && !inertiaActive && !isUserDragging && !isPointerHoldOverride) {
          const pull = Math.max(0, Math.min(1, RETURN_TO_SPIN_EASING * dt));
          userLonOffset = lerp(userLonOffset, 0, pull);
        }
      }

      const motionActive = (
        (Math.abs(getLonSpeedDegPerSec()) > 1e-6) ||
        (Math.abs(CFG.persistentLatDegPerSec || 0) > 1e-6) ||
        (Math.abs(CFG.persistentRollDegPerSec || 0) > 1e-6) ||
        (Math.abs(CFG.persistentZoomPerSec || 0) > 1e-6)
      );
      const targetIntervalMs = motionActive
        ? Math.max(0, Number(CFG.movingFrameIntervalMs || 0))
        : Math.max(0, Number(CFG.idleFrameIntervalMs || 33));
      const shouldRender = targetIntervalMs === 0 || (now - lastRenderTs) >= targetIntervalMs;

      processTimeline(elapsedMs);
      updateCountriesGroupFade(elapsedMs);

      if (timelineState.markers[CFG.introCompleteMarker] != null) {
        currentRollDeg = (currentRollDeg + (CFG.postIntroRollDegPerSec * dt)) % 360;
      }
      if (CFG.persistentMotionEnabled) {
        const markerKey = CFG.persistentMotionStartMarker;
        const startMs = (Number.isFinite(markerKey))
          ? markerKey
          : (timelineState.markers[markerKey] == null ? null : timelineState.markers[markerKey]);
        if (startMs != null && elapsedMs >= startMs && !isPointerHoldOverride) {
          const zoom = getViewZoom();
          const comp = Number(CFG.lonSpeedZoomCompensation || 0);
          const scale = (comp === 0 || zoom <= 0) ? 1 : Math.pow(1 / zoom, comp);
          const scaledLonSpeed = getLonSpeedDegPerSec() * scale;
          persistentLonOffset += (scaledLonSpeed * dt);
          persistentLatOffset += (CFG.persistentLatDegPerSec * dt);
          persistentRollOffset += (CFG.persistentRollDegPerSec * dt);
          persistentZoomOffset += (CFG.persistentZoomPerSec * dt);
        }
      }
      if (shouldRender) {
        if (typeof refreshLatUi === "function") refreshLatUi();
        updateView();
        render();
        lastRenderTs = now;
      }
      diagState.frameCount += 1;
      const diagDt = now - diagState.lastTs;
      if (diagDt >= 500) {
        diagState.fps = (diagState.frameCount * 1000) / Math.max(1, diagDt);
        diagState.frameCount = 0;
        diagState.lastTs = now;
        try {
          window.parent.postMessage({
            type: "tsi:globe-diagnostics",
            fps: Number(diagState.fps.toFixed(1)),
            renderMs: Number(diagState.renderMs.toFixed(1)),
            zoom: Number(getViewZoom().toFixed(2)),
            lon: Number((texLon + persistentLonOffset + userLonOffset).toFixed(1)),
            lat: Number((Math.max(-88, Math.min(88, texLat + persistentLatOffset + userLatOffset))).toFixed(1))
          }, "*");
        } catch (_) {}
        if (diagnosticsUi && diagnosticsUi.diagFps) diagnosticsUi.diagFps.textContent = `${diagState.fps.toFixed(1)}`;
        if (diagnosticsUi && diagnosticsUi.diagRender) diagnosticsUi.diagRender.textContent = `${diagState.renderMs.toFixed(1)} ms`;
        if (diagnosticsUi && diagnosticsUi.diagZoom) diagnosticsUi.diagZoom.textContent = `${getViewZoom().toFixed(2)}x`;
        if (diagnosticsUi && diagnosticsUi.diagCenter) {
          const viewLon = texLon + persistentLonOffset + userLonOffset;
          const viewLat = Math.max(-88, Math.min(88, texLat + persistentLatOffset + userLatOffset));
          diagnosticsUi.diagCenter.textContent = `${viewLon.toFixed(1)}, ${viewLat.toFixed(1)}`;
        }
      }
      requestAnimationFrame(tick);
    };

    const start = async () => {
      console.info(`[globe] mode=${viewMode}, source=${dataSource}`);
      if (ENABLE.texas || ENABLE.states) {
        try {
          const usAtlas = await loadJsonWithFallback("states");
          const states = topojson.feature(usAtlas, usAtlas.objects.states).features;
          const texasFeature = states.find((d) => d.id === "48");
          texas = texasFeature || texas;
          usStates = {
            type: "FeatureCollection",
            features: states.filter((d) => d.id !== "48")
          };
          projectionDirty = true;
        } catch (err) {
          console.warn("[globe] Failed to fetch state geometries; continuing without Texas/states.", err);
        }
      }

      try {
        setViewport();
        rebuildStarsField();
        initInteractive();
        updateView();
        render();

        window.addEventListener("resize", () => {
          setViewport();
          rebuildStarsField();
          updateView();
          render();
        }, { passive: true });
      } catch (err) {
        console.warn("[globe] Viewport init failed; attempting minimal fallback.", err);
        setViewport();
        rebuildStarsField();
        projection.rotate([0, 0, 0]).scale(baseScale() * CFG.introZoomTo);
        if (ENABLE.sphere && normalizeRenderMode(CFG.sphereRenderMode) !== "none") {
          sphere.attr("d", path({ type: "Sphere" }));
        }
        if (ENABLE.graticule && normalizeRenderMode(CFG.graticuleRenderMode) !== "none") {
          graticulePath.style("display", "").attr("d", path(graticule));
        }
      }

      requestAnimationFrame(tick);
    };

    start();
  </script>
</body>
</html>
